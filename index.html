<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golden Stars">
<meta name="theme-color" content="#000000">
<title>TC Golden Stars</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
:root{--black:#000;--forest:#0d2b0d;--green:#1a5c1a;--green2:#2d8c2d;--green3:#3db83d;--gold:#f5c800;--gold2:#ffd700;--gold3:#ffe566;--golddim:#c49b00;--cream:#f0f0e8;--muted:#6a8a6a;--border:#1a3a1a;--card:#0d1a0d;--card2:#142014;--red:#cc2222;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--cream);display:flex;flex-direction:column;}
::-webkit-scrollbar{display:none;}
.hdr{background:linear-gradient(180deg,#0a1a0a,#000);border-bottom:2px solid var(--gold);padding:max(env(safe-area-inset-top),10px) 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;position:relative;box-shadow:0 2px 20px rgba(245,200,0,.2);}
.hdr::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--green2);}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;border:2px solid var(--gold);flex-shrink:0;}
.hdr-logo img{width:100%;height:100%;object-fit:cover;}
.brand-top{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--green3);letter-spacing:2px;text-transform:uppercase;line-height:1;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;background:linear-gradient(180deg,var(--gold3) 0%,var(--gold) 60%,var(--golddim) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.season-pill{background:var(--forest);border:1px solid var(--golddim);border-radius:20px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold);cursor:pointer;white-space:nowrap;}
.nav{display:flex;background:#050d05;border-bottom:1px solid var(--border);flex-shrink:0;z-index:40;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
.nav-btn .ico{font-size:18px;line-height:1;}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:14px 13px 110px;}
.screen.active{display:block;}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.card-head{background:var(--card2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);}
.row-item{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid #0f1f0f;cursor:pointer;gap:12px;}
.row-item:last-child{border-bottom:none;}
.row-item:active{background:var(--card2);}
.num-badge{width:42px;height:42px;border-radius:10px;background:linear-gradient(145deg,var(--forest),var(--green));border:2px solid var(--golddim);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);flex-shrink:0;}
.date-badge{background:var(--forest);border:1px solid var(--border);border-radius:8px;padding:6px 8px;text-align:center;flex-shrink:0;min-width:44px;}
.date-mon{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.date-day{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);line-height:1;}
.item-info{flex:1;min-width:0;}
.item-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.item-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold2);line-height:1;}
.item-val-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;text-align:right;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.stat-cell{background:var(--card);padding:12px 6px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--cream);}
.sv.gold{color:var(--gold2);}.sv.star{color:var(--gold3);}.sv.green{color:var(--green3);}
.sl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.rate-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.rate-cell{background:var(--card);padding:10px 6px;text-align:center;}
.rv{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green3);line-height:1;}
.rl{font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:10px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;cursor:pointer;}
.btn:active{opacity:.8;}
.btn-gold{background:linear-gradient(180deg,var(--gold3),var(--gold));color:#0a1a0a;}
.btn-green{background:linear-gradient(180deg,var(--green2),var(--green));color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-danger{background:var(--red);color:#fff;}
.btn-full{width:100%;}
.btn-sm{padding:7px 12px;font-size:14px;border-radius:8px;}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 76px);right:18px;width:56px;height:56px;border-radius:16px;background:linear-gradient(145deg,var(--gold3),var(--gold));border:none;color:#0a1a0a;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(245,200,0,.5);display:flex;align-items:center;justify-content:center;z-index:80;}
.fab:active{opacity:.8;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:22px 22px 0 0;border-top:2px solid var(--gold);width:100%;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),20px);}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:10px auto 4px;}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 14px;border-bottom:1px solid var(--border);}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;color:var(--gold);}
.sh-close{width:30px;height:30px;border-radius:50%;background:var(--card2);border:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-body{padding:16px 18px;}
.fg{margin-bottom:14px;}
.fl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--golddim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.fi,.fs{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--cream);font-family:'Barlow',sans-serif;font-size:16px;padding:11px 13px;outline:none;-webkit-appearance:none;appearance:none;}
.fi.num{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);padding:8px 4px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sdiv{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin:16px 0 12px;}
.sdiv::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.sdiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
.lb-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.lb-tab{background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;white-space:nowrap;}
.lb-tab.active{background:var(--gold);color:#0a1a0a;border-color:var(--gold);}
.lb-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #0f1f0f;gap:12px;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;width:28px;text-align:center;color:var(--muted);flex-shrink:0;}
.lb-rank.r1{color:var(--gold2);}.lb-rank.r2{color:#c0c0c0;}.lb-rank.r3{color:#cd7f32;}
.lb-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold2);line-height:1;margin-left:auto;}
.hero{background:linear-gradient(135deg,var(--forest),#0a0e0a);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.hero-num{width:64px;height:64px;border-radius:14px;background:linear-gradient(145deg,#0d2b0d,#1a5c1a);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold2);flex-shrink:0;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1;color:var(--cream);}
.hero-meta{font-size:13px;color:var(--muted);margin-top:3px;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--golddim);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;padding:0;margin-bottom:14px;}
.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-ico{font-size:52px;margin-bottom:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--cream);letter-spacing:1px;margin-bottom:6px;}
.empty-sub{font-size:14px;line-height:1.5;}
.conf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:24px;}
.conf-overlay.open{display:flex;}
.conf-box{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center;}
.conf-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);letter-spacing:1px;margin-bottom:8px;}
.conf-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.conf-btns{display:flex;gap:10px;}
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%) translateY(-16px);background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;padding:10px 22px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;z-index:300;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.gs-u{background:rgba(245,200,0,.15);color:var(--gold);display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
.gs-l{background:rgba(61,184,61,.15);color:var(--green3);display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
.rec-bar{display:flex;gap:8px;margin-bottom:14px;}
.rec-cell{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.rec-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;color:var(--gold2);}
.rec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.hint{background:var(--forest);border:1px solid var(--golddim);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;}
.hint-txt{font-size:13px;color:var(--muted);line-height:1.5;flex:1;}
.hint-txt b{color:var(--gold);}
</style>
</head>

var LS = 'gs_v4';
var S = {season:'Spring 2025', players:[], games:[], stats:[]};
var tab = 'schedule';
var curPid = null, curGid = null;
var editPid = null, editGid = null, editSid = null;
var activeGid = null, forcePid = null;
var lbCat = 'avg';

function load() {
  try {
    var r = localStorage.getItem(LS);
    if (r) {
      var d = JSON.parse(r);
      S.season = d.season || 'Spring 2025';
      S.players = d.players || [];
      S.games = d.games || [];
      S.stats = d.stats || [];
    }
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(LS, JSON.stringify(S)); } catch(e) {}
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function n(v) { return parseFloat(v) || 0; }

function calcAVG(h, ab) {
  if (!ab) return '.000';
  return '.' + String(Math.round(h/ab*1000)).padStart(3,'0');
}
function calcOBP(h, bb, ab) {
  var pa = ab + bb;
  if (!pa) return '.000';
  return '.' + String(Math.round((h+bb)/pa*1000)).padStart(3,'0');
}
function calcSLG(h, hr, ab) {
  if (!ab) return '.000';
  var tb = (h - hr) + hr * 4;
  return '.' + String(Math.round(tb/ab*1000)).padStart(3,'0');
}
function calcERA(er, ip) {
  if (!ip) return '-.--';
  return ((er/ip)*9).toFixed(2);
}
function aggPlayer(pid) {
  var gs = S.stats.filter(function(s){ return s.playerId === pid; });
  function sum(k) { return gs.reduce(function(a,s){ return a + n(s[k]); }, 0); }
  var ab=sum('ab'), h=sum('h'), bb=sum('bb'), hr=sum('hr');
  return {
    games:gs.length, ab:ab, h:h, bb:bb, hr:hr,
    rbi:sum('rbi'), r:sum('r'), k:sum('k'), sb:sum('sb'),
    ip:sum('ip'), er:sum('er'), kp:sum('kp'), bbp:sum('bbp'),
    avg:calcAVG(h,ab), obp:calcOBP(h,bb,ab), slg:calcSLG(h,hr,ab),
    era:calcERA(sum('er'),sum('ip'))
  };
}
function pname(p) {
  return ((p.first||'')+' '+(p.last||'')).trim()||'Player';
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function monLbl(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short'}).toUpperCase();
}
function dayLbl(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').getDate();
}
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

function showTab(t) {
  var screens = document.querySelectorAll('.screen');
  for (var i=0; i<screens.length; i++) screens[i].classList.remove('active');
  var navBtns = document.querySelectorAll('.nav-btn');
  for (var i=0; i<navBtns.length; i++) navBtns[i].classList.remove('active');
  var sid = t==='player'?'screen-player':t==='gamedetail'?'screen-gamedetail':'screen-'+t;
  document.getElementById(sid).classList.add('active');
  var nb = document.getElementById('nav-'+t);
  if (nb) nb.classList.add('active');
  tab = t;
  updateFab();
  if (t==='schedule') renderSchedule();
  if (t==='roster') renderRoster();
  if (t==='leaders') renderLeaders();
  if (t==='player') renderPlayerDetail();
  if (t==='gamedetail') renderGameDetail();
}

function updateFab() {
  var f = document.getElementById('mainFab');
  if (tab==='schedule'||tab==='roster'||tab==='gamedetail'||tab==='player') {
    f.textContent = '+';
    f.style.display = 'flex';
  } else {
    f.style.display = 'none';
  }
}

function fabAction() {
  if (tab==='schedule') openGameModal(null);
  else if (tab==='roster') openPlayerModal(null);
  else if (tab==='gamedetail') openStatModal(curGid, null, null);
  else if (tab==='player') openStatModal(null, null, curPid);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function closeAllModals() {
  var modals = document.querySelectorAll('.overlay');
  for (var i=0; i<modals.length; i++) {
    modals[i].classList.remove('open');
  }
}

function dismissHint() {
  localStorage.setItem('gs_hint','1');
  var h = document.getElementById('installHint');
  if (h) h.innerHTML = '';
}

function renderInstallHint() {
  var el = document.getElementById('installHint');
  if (!el) return;
  if (localStorage.getItem('gs_hint') || (window.navigator && window.navigator.standalone)) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = '<div class="hint">'
    + '<div style="font-size:22px;flex-shrink:0">&#128242;</div>'
    + '<div class="hint-txt"><b>Add to Home Screen</b> for the full app.<br>'
    + 'Tap <b>Share &#8593;</b> in Safari then <b>Add to Home Screen</b></div>'
    + '<button style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;align-self:center;flex-shrink:0" onclick="dismissHint()">&#10005;</button>'
    + '</div>';
}

function openSettings() {
  closeAllModals();
  document.getElementById('sSeason').value = S.season;
  document.getElementById('settingsModal').classList.add('open');
}

function saveSettings() {
  S.season = document.getElementById('sSeason').value.trim() || 'Spring 2025';
  save();
  closeModal('settingsModal');
  toast('Saved!');
}

function toggleImport() {
  var a = document.getElementById('importArea');
  a.style.display = a.style.display==='none' ? 'block' : 'none';
}

function exportCSV() {
  if (!S.players.length) { toast('No data to export'); return; }
  var rows = ['Name,#,Pos,Age,Bats,G,AB,H,AVG,OBP,SLG,RBI,R,HR,BB,K,SB,IP,ER,ERA,Ks(P),BB(P)'];
  for (var i=0; i<S.players.length; i++) {
    var p = S.players[i];
    var a = aggPlayer(p.id);
    rows.push(['"'+pname(p)+'"',p.num||'',p.pos||'',p.age||'',p.bats||'',a.games,a.ab,a.h,a.avg,a.obp,a.slg,a.rbi,a.r,a.hr,a.bb,a.k,a.sb,a.ip,a.er,a.era,a.kp,a.bbp].join(','));
  }
  var csv = rows.join('\n');
  try {
    var blob = new Blob([csv], {type:'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'GoldenStars.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('CSV exported!');
  } catch(e) {
    document.getElementById('importJSON').value = csv;
    document.getElementById('importArea').style.display = 'block';
    toast('Copy from the text box');
  }
}

function exportJSON() {
  var json = JSON.stringify(S, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(function(){ toast('Backup copied!'); });
  } else {
    document.getElementById('importJSON').value = json;
    document.getElementById('importArea').style.display = 'block';
    toast('Copy the JSON from the box');
  }
}

function importData() {
  try {
    var raw = document.getElementById('importJSON').value.trim();
    var p = JSON.parse(raw);
    if (p.players && p.games) {
      S = {season:p.season||'Spring 2025', players:p.players, games:p.games, stats:p.stats||[]};
      save(); closeModal('settingsModal'); showTab('schedule'); toast('Data restored!');
    } else { toast('Invalid backup format'); }
  } catch(e) { toast('Could not parse JSON'); }
}

// ---- SCHEDULE ----
function renderSchedule() {
  renderInstallHint();
  var el = document.getElementById('scheduleContent');
  if (!S.games.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">&#128197;</div>'
      + '<div class="empty-title">No Games Scheduled</div>'
      + '<div class="empty-sub">Tap + to add your first game</div></div>';
    return;
  }
  var sorted = S.games.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var w=0, l=0, ti=0;
  for (var i=0; i<sorted.length; i++) {
    var g = sorted[i];
    if (g.ourScore!==''&&g.theirScore!=='') {
      if (n(g.ourScore)>n(g.theirScore)) w++;
      else if (n(g.ourScore)<n(g.theirScore)) l++;
      else ti++;
    }
  }
  var html = '<div class="rec-bar">'
    + '<div class="rec-cell"><div class="rec-val" style="color:var(--green3)">'+w+'</div><div class="rec-lbl">Wins</div></div>'
    + '<div class="rec-cell"><div class="rec-val" style="color:var(--red)">'+l+'</div><div class="rec-lbl">Losses</div></div>'
    + '<div class="rec-cell"><div class="rec-val">'+ti+'</div><div class="rec-lbl">Ties</div></div>'
    + '<div class="rec-cell"><div class="rec-val">'+sorted.length+'</div><div class="rec-lbl">Total</div></div></div>'
    + '<div class="card"><div class="card-head"><span class="card-title">'+S.season+'</span></div>';
  for (var i=0; i<sorted.length; i++) {
    var g = sorted[i];
    var logged = S.stats.some(function(s){ return s.gameId===g.id; });
    var cnt = S.stats.filter(function(s){ return s.gameId===g.id; }).length;
    var score = (g.ourScore!==''&&g.theirScore!=='') ? g.ourScore+'-'+g.theirScore : '';
    html += '<div class="row-item" data-action="game" data-id="'+g.id+'">'
      + '<div class="date-badge"><div class="date-mon">'+monLbl(g.date)+'</div><div class="date-day">'+dayLbl(g.date)+'</div></div>'
      + '<div class="item-info"><div class="item-name">vs. '+(g.opp||'TBD')+'</div>'
      + '<div class="item-sub">'+(g.loc||'')+(g.time?' '+g.time:'')+' &middot; '+cnt+' logged</div></div>'
      + '<div style="text-align:right">'
      + (score?'<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:var(--gold)">'+score+'</div>':'')
      + '<div><span class="'+(logged?'gs-l':'gs-u')+'">'+(logged?'Logged':'Upcoming')+'</span></div>'
      + '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
  // Attach click handlers
  var items = el.querySelectorAll('[data-action="game"]');
  for (var i=0; i<items.length; i++) {
    (function(el){ el.addEventListener('click', function(){ openGameDetail(el.getAttribute('data-id')); }); })(items[i]);
  }
}

function openGameModal(gid) {
  closeAllModals();
  editGid = gid;
  var g = null;
  for (var i=0; i<S.games.length; i++) { if (S.games[i].id===gid) { g=S.games[i]; break; } }
  document.getElementById('gmTitle').textContent = g ? 'EDIT GAME' : 'ADD GAME';
  document.getElementById('gmDate').value = g ? g.date : new Date().toISOString().slice(0,10);
  document.getElementById('gmTime').value = g ? (g.time||'') : '';
  document.getElementById('gmOpp').value = g ? (g.opp||'') : '';
  document.getElementById('gmLoc').value = g ? (g.loc||'') : '';
  document.getElementById('gmOurScore').value = g ? (g.ourScore||'') : '';
  document.getElementById('gmTheirScore').value = g ? (g.theirScore||'') : '';
  document.getElementById('gmNotes').value = g ? (g.notes||'') : '';
  document.getElementById('delGameBtn').style.display = g ? 'block' : 'none';
  document.getElementById('gameModal').classList.add('open');
}

function saveGame() {
  var date = document.getElementById('gmDate').value;
  if (!date) { toast('Pick a date'); return; }
  var data = {
    date:date, time:document.getElementById('gmTime').value,
    opp:document.getElementById('gmOpp').value.trim(),
    loc:document.getElementById('gmLoc').value.trim(),
    ourScore:document.getElementById('gmOurScore').value,
    theirScore:document.getElementById('gmTheirScore').value,
    notes:document.getElementById('gmNotes').value.trim()
  };
  if (editGid) {
    for (var i=0; i<S.games.length; i++) { if (S.games[i].id===editGid) { Object.assign(S.games[i],data); break; } }
  } else { data.id=uid(); S.games.push(data); }
  save(); closeModal('gameModal'); toast(editGid?'Game updated!':'Game added!'); renderSchedule();
}

function promptDelGame() {
  showConfirm('Delete Game?','All stats for this game will be deleted.',function(){
    S.stats = S.stats.filter(function(s){ return s.gameId!==editGid; });
    S.games = S.games.filter(function(g){ return g.id!==editGid; });
    save(); closeModal('gameModal'); closeConfirm(); toast('Deleted'); showTab('schedule');
  });
}

function openGameDetail(gid) { curGid=gid; showTab('gamedetail'); }

function renderGameDetail() {
  var g = null;
  for (var i=0; i<S.games.length; i++) { if (S.games[i].id===curGid) { g=S.games[i]; break; } }
  if (!g) { showTab('schedule'); return; }
  var stats = S.stats.filter(function(s){ return s.gameId===g.id; });
  function tsum(k){ return stats.reduce(function(a,s){ return a+n(s[k]); },0); }
  var tAB=tsum('ab'), tH=tsum('h');
  var score = '';
  if (g.ourScore!==''&&g.theirScore!=='') {
    score = '<div style="display:flex;justify-content:center;align-items:baseline;gap:16px;margin:8px 0 12px;">'
      + '<div style="text-align:center">'
      + '<div style="font-size:11px;color:var(--muted);font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:1px">GOLDEN STARS</div>'
      + '<div style="font-family:Bebas Neue,sans-serif;font-size:56px;color:var(--gold2);line-height:1">'+g.ourScore+'</div></div>'
      + '<div style="font-family:Bebas Neue,sans-serif;font-size:32px;color:var(--muted)">-</div>'
      + '<div style="text-align:center">'
      + '<div style="font-size:11px;color:var(--muted);font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:1px">'+(g.opp||'OPP').toUpperCase()+'</div>'
      + '<div style="font-family:Bebas Neue,sans-serif;font-size:56px;color:var(--muted);line-height:1">'+g.theirScore+'</div></div></div>';
  }
  var totals = '';
  if (stats.length) {
    totals = '<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Team Totals</span></div>'
      + '<div class="stat-grid">'
      + '<div class="stat-cell"><div class="sv star">'+calcAVG(tH,tAB)+'</div><div class="sl">AVG</div></div>'
      + '<div class="stat-cell"><div class="sv gold">'+tH+'</div><div class="sl">Hits</div></div>'
      + '<div class="stat-cell"><div class="sv">'+tAB+'</div><div class="sl">AB</div></div>'
      + '<div class="stat-cell"><div class="sv gold">'+tsum('rbi')+'</div><div class="sl">RBI</div></div>'
      + '<div class="stat-cell"><div class="sv">'+tsum('r')+'</div><div class="sl">Runs</div></div>'
      + '<div class="stat-cell"><div class="sv">'+tsum('hr')+'</div><div class="sl">HR</div></div>'
      + '</div></div>';
  }
  var playerRows = '';
  if (stats.length) {
    for (var i=0; i<stats.length; i++) {
      var s = stats[i];
      var p = null;
      for (var j=0; j<S.players.length; j++) { if (S.players[j].id===s.playerId) { p=S.players[j]; break; } }
      playerRows += '<div class="row-item" data-action="editstat" data-gid="'+g.id+'" data-sid="'+s.id+'">'
        + '<div class="num-badge">'+(p?p.num||'?':'?')+'</div>'
        + '<div class="item-info"><div class="item-name">'+(p?pname(p):'Unknown')+'</div>'
        + '<div class="item-sub">'+(s.h||0)+'-'+(s.ab||0)
        + (n(s.rbi)?' &middot; '+s.rbi+' RBI':'')
        + (n(s.r)?' &middot; '+s.r+' R':'')
        + (n(s.hr)?' &middot; '+s.hr+' HR':'')
        + (n(s.ip)?' &middot; '+s.ip+' IP':'')
        + (s.notes?' &middot; '+s.notes:'')+'</div></div>'
        + '<div style="text-align:right"><div class="item-val">'+calcAVG(n(s.h),n(s.ab))+'</div><div class="item-val-lbl">AVG</div></div></div>';
    }
  } else {
    playerRows = '<div style="padding:20px;text-align:center;color:var(--muted)">No players logged yet. Tap + to add.</div>';
  }
  var el = document.getElementById('gameDetailContent');
  el.innerHTML = '<div class="hero"><div style="flex:1">'
    + '<div class="hero-name">vs. '+(g.opp||'TBD')+'</div>'
    + '<div class="hero-meta">'+fmtDate(g.date)+(g.time?' &middot; '+g.time:'')+'</div>'
    + (g.loc?'<div class="hero-meta">'+g.loc+'</div>':'')
    + '</div><button class="btn btn-ghost btn-sm" data-action="editgame" data-id="'+g.id+'">Edit</button></div>'
    + score + totals
    + '<div class="card"><div class="card-head"><span class="card-title">Player Stats</span>'
    + '<button class="btn btn-green btn-sm" data-action="addstat" data-gid="'+g.id+'">+ Player</button></div>'
    + playerRows + '</div>';
  // Attach handlers
  var editBtn = el.querySelector('[data-action="editgame"]');
  if (editBtn) editBtn.addEventListener('click', function(){ openGameModal(this.getAttribute('data-id')); });
  var addBtn = el.querySelector('[data-action="addstat"]');
  if (addBtn) addBtn.addEventListener('click', function(){ openStatModal(this.getAttribute('data-gid'),null,null); });
  var statItems = el.querySelectorAll('[data-action="editstat"]');
  for (var i=0; i<statItems.length; i++) {
    (function(el){ el.addEventListener('click', function(){
      openStatModal(el.getAttribute('data-gid'), el.getAttribute('data-sid'), null);
    }); })(statItems[i]);
  }
}

// ---- ROSTER ----
function renderRoster() {
  var el = document.getElementById('rosterContent');
  if (!S.players.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">&#128101;</div>'
      + '<div class="empty-title">No Players Yet</div>'
      + '<div class="empty-sub">Tap + to add your first Golden Star</div></div>';
    return;
  }
  var sorted = S.players.slice().sort(function(a,b){ return n(a.num)-n(b.num); });
  var html = '<div class="card"><div class="card-head"><span class="card-title">'+S.season+'</span>'
    + '<span style="font-size:12px;color:var(--muted)">'+S.players.length+' Players</span></div>';
  for (var i=0; i<sorted.length; i++) {
    var p = sorted[i];
    var a = aggPlayer(p.id);
    html += '<div class="row-item" data-action="player" data-id="'+p.id+'">'
      + '<div class="num-badge">'+(p.num||'?')+'</div>'
      + '<div class="item-info"><div class="item-name">'+pname(p)+'</div>'
      + '<div class="item-sub">'+(p.pos||'-')+' &middot; Age '+(p.age||'?')+' &middot; Bats '+(p.bats||'?')+' &middot; '+a.games+' G</div></div>'
      + '<div style="text-align:right"><div class="item-val">'+a.avg+'</div><div class="item-val-lbl">AVG</div></div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
  var items = el.querySelectorAll('[data-action="player"]');
  for (var i=0; i<items.length; i++) {
    (function(el){ el.addEventListener('click', function(){ openPlayerDetail(el.getAttribute('data-id')); }); })(items[i]);
  }
}

function openPlayerModal(pid) {
  closeAllModals();
  editPid = pid;
  var p = null;
  for (var i=0; i<S.players.length; i++) { if (S.players[i].id===pid) { p=S.players[i]; break; } }

  document.getElementById('pNum').value = p?(p.num||''):'';
  document.getElementById('pPos').value = p?(p.pos||''):'';
  document.getElementById('pFirst').value = p?(p.first||''):'';
  document.getElementById('pLast').value = p?(p.last||''):'';
  document.getElementById('pAge').value = p?(p.age||''):'';
  document.getElementById('pBats').value = p?(p.bats||''):'';
  document.getElementById('delPlayerBtn').style.display = p?'block':'none';
  document.getElementById('playerModal').classList.add('open');
}

function savePlayer() {
  var first = document.getElementById('pFirst').value.trim();
  if (!first) { toast('Enter a first name'); return; }
  var data = {
    num:document.getElementById('pNum').value.trim(),
    pos:document.getElementById('pPos').value,
    first:first, last:document.getElementById('pLast').value.trim(),
    age:document.getElementById('pAge').value.trim(),
    bats:document.getElementById('pBats').value
  };
  if (editPid) {
    for (var i=0; i<S.players.length; i++) { if (S.players[i].id===editPid) { Object.assign(S.players[i],data); break; } }
  } else { data.id=uid(); S.players.push(data); }
  save(); closeModal('playerModal'); toast(editPid?'Updated!':'Player added!'); renderRoster();
}

function promptDelPlayer() {
  showConfirm('Delete Player?','All stats for this player will be deleted.',function(){
    S.stats = S.stats.filter(function(s){ return s.playerId!==editPid; });
    S.players = S.players.filter(function(p){ return p.id!==editPid; });
    save(); closeModal('playerModal'); closeConfirm(); toast('Deleted'); showTab('roster');
  });
}

function openPlayerDetail(pid) { curPid=pid; showTab('player'); }

function renderPlayerDetail() {
  var p = null;
  for (var i=0; i<S.players.length; i++) { if (S.players[i].id===curPid) { p=S.players[i]; break; } }
  if (!p) { showTab('roster'); return; }
  var agg = aggPlayer(p.id);
  var pstats = S.stats.filter(function(s){ return s.playerId===p.id; });
  var withGames = [];
  for (var i=0; i<pstats.length; i++) {
    var g = null;
    for (var j=0; j<S.games.length; j++) { if (S.games[j].id===pstats[i].gameId) { g=S.games[j]; break; } }
    if (g) withGames.push({s:pstats[i], g:g});
  }
  withGames.sort(function(a,b){ return b.g.date.localeCompare(a.g.date); });
  var gameRows = '';
  if (withGames.length) {
    for (var i=0; i<withGames.length; i++) {
      var s=withGames[i].s, g=withGames[i].g;
      gameRows += '<div class="row-item" data-action="editstat" data-gid="'+g.id+'" data-sid="'+s.id+'">'
        + '<div class="date-badge"><div class="date-mon">'+monLbl(g.date)+'</div><div class="date-day">'+dayLbl(g.date)+'</div></div>'
        + '<div class="item-info"><div class="item-name">vs. '+(g.opp||'TBD')+'</div>'
        + '<div class="item-sub">'+(s.h||0)+'-'+(s.ab||0)
        + (n(s.rbi)?' &middot; '+s.rbi+' RBI':'')
        + (n(s.hr)?' &middot; '+s.hr+' HR':'')
        + (n(s.ip)?' &middot; '+s.ip+' IP':'')
        + (s.notes?' &middot; '+s.notes:'')+'</div></div>'
        + '<div style="text-align:right"><div class="item-val">'+calcAVG(n(s.h),n(s.ab))+'</div><div class="item-val-lbl">AVG</div></div></div>';
    }
  } else {
    gameRows = '<div style="padding:20px;text-align:center;color:var(--muted)">No games logged yet.</div>';
  }
  var pitching = '';
  if (agg.ip>0) {
    pitching = '<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Pitching</span></div>'
      + '<div class="stat-grid">'
      + '<div class="stat-cell"><div class="sv gold">'+agg.era+'</div><div class="sl">ERA</div></div>'
      + '<div class="stat-cell"><div class="sv">'+agg.ip+'</div><div class="sl">IP</div></div>'
      + '<div class="stat-cell"><div class="sv green">'+agg.kp+'</div><div class="sl">K</div></div>'
      + '<div class="stat-cell"><div class="sv">'+agg.bbp+'</div><div class="sl">BB</div></div>'
      + '</div></div>';
  }
  var el = document.getElementById('playerDetail');
  el.innerHTML = '<div class="hero"><div class="hero-num">'+(p.num||'?')+'</div><div style="flex:1">'
    + '<div class="hero-name">'+pname(p)+'</div>'
    + '<div class="hero-meta">'+(p.pos||'-')+' &middot; Age '+(p.age||'?')+' &middot; Bats '+(p.bats||'?')+'</div>'
    + '<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" data-action="editplayer" data-id="'+p.id+'">Edit</button></div>'
    + '</div></div>'
    + '<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Season Stats</span><span style="font-size:12px;color:var(--muted)">'+agg.games+' G</span></div>'
    + '<div class="stat-grid">'
    + '<div class="stat-cell"><div class="sv star">'+agg.avg+'</div><div class="sl">AVG</div></div>'
    + '<div class="stat-cell"><div class="sv gold">'+agg.h+'</div><div class="sl">Hits</div></div>'
    + '<div class="stat-cell"><div class="sv">'+agg.ab+'</div><div class="sl">AB</div></div>'
    + '<div class="stat-cell"><div class="sv gold">'+agg.rbi+'</div><div class="sl">RBI</div></div>'
    + '<div class="stat-cell"><div class="sv">'+agg.r+'</div><div class="sl">Runs</div></div>'
    + '<div class="stat-cell"><div class="sv">'+agg.hr+'</div><div class="sl">HR</div></div>'
    + '<div class="stat-cell"><div class="sv">'+agg.bb+'</div><div class="sl">BB</div></div>'
    + '<div class="stat-cell"><div class="sv">'+agg.sb+'</div><div class="sl">SB</div></div>'
    + '</div>'
    + '<div class="rate-strip">'
    + '<div class="rate-cell"><div class="rv">'+agg.obp+'</div><div class="rl">OBP</div></div>'
    + '<div class="rate-cell"><div class="rv">'+agg.slg+'</div><div class="rl">SLG</div></div>'
    + '<div class="rate-cell"><div class="rv">'+agg.k+'</div><div class="rl">K</div></div>'
    + '</div></div>'
    + pitching
    + '<div class="card"><div class="card-head"><span class="card-title">Game Log</span></div>'+gameRows+'</div>';
  var editBtn = el.querySelector('[data-action="editplayer"]');
  if (editBtn) editBtn.addEventListener('click', function(){ openPlayerModal(this.getAttribute('data-id')); });
  var statItems = el.querySelectorAll('[data-action="editstat"]');
  for (var i=0; i<statItems.length; i++) {
    (function(item){ item.addEventListener('click', function(){
      openStatModal(item.getAttribute('data-gid'), item.getAttribute('data-sid'), null);
    }); })(statItems[i]);
  }
}

// ---- STAT MODAL ----
function openStatModal(gid, sid, fpid) {
  closeAllModals();
  activeGid = gid; editSid = sid; forcePid = fpid;
  var s = null;
  for (var i=0; i<S.stats.length; i++) { if (S.stats[i].id===sid) { s=S.stats[i]; break; } }
  document.getElementById('smTitle').textContent = s ? 'EDIT STATS' : 'LOG STATS';
  var sel = document.getElementById('stPlayer');
  var sorted = S.players.slice().sort(function(a,b){ return n(a.num)-n(b.num); });
  sel.innerHTML = '';
  for (var i=0; i<sorted.length; i++) {
    var op = document.createElement('option');
    op.value = sorted[i].id;
    op.textContent = (sorted[i].num?'#'+sorted[i].num+' ':'')+pname(sorted[i]);
    sel.appendChild(op);
  }
  if (s) sel.value = s.playerId;
  else if (fpid) sel.value = fpid;
  var gw = document.getElementById('stGameWrap');
  if (!gid && !s) {
    var gs = document.getElementById('stGame');
    var gsorted = S.games.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    gs.innerHTML = '';
    for (var i=0; i<gsorted.length; i++) {
      var op = document.createElement('option');
      op.value = gsorted[i].id;
      op.textContent = fmtDate(gsorted[i].date)+' vs. '+(gsorted[i].opp||'TBD');
      gs.appendChild(op);
    }
    gw.style.display = 'block';
  } else { gw.style.display = 'none'; }
  document.getElementById('stAB').value = s?(s.ab||''):'';
  document.getElementById('stH').value = s?(s.h||''):'';
  document.getElementById('stRBI').value = s?(s.rbi||''):'';
  document.getElementById('stR').value = s?(s.r||''):'';
  document.getElementById('stBB').value = s?(s.bb||''):'';
  document.getElementById('stK').value = s?(s.k||''):'';
  document.getElementById('stHR').value = s?(s.hr||''):'';
  document.getElementById('stSB').value = s?(s.sb||''):'';
  document.getElementById('stIP').value = s?(s.ip||''):'';
  document.getElementById('stER').value = s?(s.er||''):'';
  document.getElementById('stKP').value = s?(s.kp||''):'';
  document.getElementById('stBBP').value = s?(s.bbp||''):'';
  document.getElementById('stNotes').value = s?(s.notes||''):'';
  document.getElementById('delStatBtn').style.display = s?'block':'none';
  document.getElementById('statModal').classList.add('open');
}

function saveStat() {
  var pid = document.getElementById('stPlayer').value;
  if (!pid) { toast('Select a player'); return; }
  var gid = activeGid;
  if (!gid && !editSid) { gid = document.getElementById('stGame').value; }
  if (!gid && editSid) {
    for (var i=0; i<S.stats.length; i++) { if (S.stats[i].id===editSid) { gid=S.stats[i].gameId; break; } }
  }
  if (!gid) { toast('Select a game'); return; }
  var data = {
    playerId:pid, gameId:gid,
    ab:document.getElementById('stAB').value, h:document.getElementById('stH').value,
    rbi:document.getElementById('stRBI').value, r:document.getElementById('stR').value,
    bb:document.getElementById('stBB').value, k:document.getElementById('stK').value,
    hr:document.getElementById('stHR').value, sb:document.getElementById('stSB').value,
    ip:document.getElementById('stIP').value, er:document.getElementById('stER').value,
    kp:document.getElementById('stKP').value, bbp:document.getElementById('stBBP').value,
    notes:document.getElementById('stNotes').value.trim()
  };
  if (editSid) {
    for (var i=0; i<S.stats.length; i++) { if (S.stats[i].id===editSid) { Object.assign(S.stats[i],data); break; } }
  } else { data.id=uid(); S.stats.push(data); }
  save(); closeModal('statModal'); toast(editSid?'Stats updated!':'Stats logged!');
  if (tab==='gamedetail') renderGameDetail();
  else if (tab==='player') renderPlayerDetail();
  else renderSchedule();
}

function promptDelStat() {
  showConfirm('Delete Stats?','This entry will be removed.',function(){
    S.stats = S.stats.filter(function(s){ return s.id!==editSid; });
    save(); closeModal('statModal'); closeConfirm(); toast('Deleted');
    if (tab==='gamedetail') renderGameDetail();
    else renderPlayerDetail();
  });
}

// ---- LEADERS ----
function renderLeaders() {
  var el = document.getElementById('leadersContent');
  if (!S.players.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">&#127942;</div>'
      + '<div class="empty-title">No Data Yet</div>'
      + '<div class="empty-sub">Add players and log games first</div></div>';
    return;
  }
  var cats = [
    {k:'avg',l:'AVG'},{k:'obp',l:'OBP'},{k:'slg',l:'SLG'},
    {k:'h',l:'Hits'},{k:'hr',l:'HR'},{k:'rbi',l:'RBI'},
    {k:'r',l:'Runs'},{k:'sb',l:'SB'},{k:'k',l:'K (bat)'},
    {k:'era',l:'ERA'},{k:'kp',l:'K (pitch)'}
  ];
  var tabs = '<div class="lb-tabs">';
  for (var i=0; i<cats.length; i++) {
    tabs += '<button class="lb-tab'+(lbCat===cats[i].k?' active':'')+'" data-cat="'+cats[i].k+'">'+cats[i].l+'</button>';
  }
  tabs += '</div>';
  var players = [];
  for (var i=0; i<S.players.length; i++) {
    var a = aggPlayer(S.players[i].id);
    if (a.games>0) players.push({p:S.players[i], agg:a});
  }
  var sorted;
  if (lbCat==='avg') sorted=players.slice().sort(function(a,b){ return parseFloat(b.agg.avg)-parseFloat(a.agg.avg); });
  else if (lbCat==='obp') sorted=players.slice().sort(function(a,b){ return parseFloat(b.agg.obp)-parseFloat(a.agg.obp); });
  else if (lbCat==='slg') sorted=players.slice().sort(function(a,b){ return parseFloat(b.agg.slg)-parseFloat(a.agg.slg); });
  else if (lbCat==='era') sorted=players.filter(function(x){ return x.agg.ip>0; }).sort(function(a,b){ return parseFloat(a.agg.era)-parseFloat(b.agg.era); });
  else if (lbCat==='kp') sorted=players.filter(function(x){ return x.agg.ip>0; }).sort(function(a,b){ return b.agg.kp-a.agg.kp; });
  else sorted=players.slice().sort(function(a,b){ return n(b.agg[lbCat])-n(a.agg[lbCat]); });
  var rows = '<div class="card">';
  if (!sorted.length) {
    rows += '<div style="padding:20px;text-align:center;color:var(--muted)">No data for this category</div>';
  } else {
    for (var i=0; i<sorted.length; i++) {
      var x = sorted[i];
      var val = (lbCat==='avg'||lbCat==='obp'||lbCat==='slg') ? x.agg[lbCat] : lbCat==='era' ? x.agg.era : x.agg[lbCat];
      var rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
      var ri = i===0?'&#127945;':i===1?'&#129352;':i===2?'&#129353;':(i+1);
      rows += '<div class="lb-row">'
        + '<div class="lb-rank '+rc+'">'+ri+'</div>'
        + '<div><div style="font-family:Barlow Condensed,sans-serif;font-size:17px;font-weight:700">'+pname(x.p)+'</div>'
        + '<div style="font-size:11px;color:var(--muted)">#'+(x.p.num||'?')+' '+(x.p.pos||'-')+' &middot; '+x.agg.games+' G</div></div>'
        + '<div class="lb-val">'+val+'</div></div>';
    }
  }
  rows += '</div>';
  el.innerHTML = tabs + rows;
  var tabBtns = el.querySelectorAll('[data-cat]');
  for (var i=0; i<tabBtns.length; i++) {
    (function(btn){ btn.addEventListener('click', function(){ lbCat=btn.getAttribute('data-cat'); renderLeaders(); }); })(tabBtns[i]);
  }
}

function showConfirm(title, sub, cb) {
  document.getElementById('confTitle').textContent = title;
  document.getElementById('confSub').textContent = sub;
  document.getElementById('confOkBtn').onclick = cb;
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
}
