<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golden Stars">
<meta name="theme-color" content="#000000">
<title>TC Golden Stars</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
:root{
  --black:#000;--forest:#0d2b0d;--green:#1a5c1a;--green2:#2d8c2d;--green3:#3db83d;
  --gold:#f5c800;--gold2:#ffd700;--gold3:#ffe566;--golddim:#c49b00;
  --cream:#f0f0e8;--muted:#6a8a6a;--border:#1a3a1a;--card:#0d1a0d;--card2:#142014;
  --red:#cc2222;--blue:#2266cc;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--cream);display:flex;flex-direction:column;}
::-webkit-scrollbar{display:none;}
.hdr{background:linear-gradient(180deg,#0a1a0a,#000);border-bottom:2px solid var(--gold);padding:max(env(safe-area-inset-top),10px) 14px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;position:relative;}
.hdr::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--green2);}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;border:2px solid var(--gold);flex-shrink:0;}
.hdr-logo img{width:100%;height:100%;object-fit:cover;}
.brand-top{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--green3);letter-spacing:2px;text-transform:uppercase;line-height:1;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;background:linear-gradient(180deg,var(--gold3),var(--gold),var(--golddim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.season-pill{background:var(--forest);border:1px solid var(--golddim);border-radius:20px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold);cursor:pointer;}
.nav{display:flex;background:#050d05;border-bottom:1px solid var(--border);flex-shrink:0;z-index:40;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
.nav-btn .ico{font-size:17px;line-height:1;}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:13px 13px 100px;}
.screen.active{display:block;}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.card-head{background:var(--card2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);}
.row-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #0f1f0f;cursor:pointer;gap:12px;}
.row-item:last-child{border-bottom:none;}
.row-item:active{background:var(--card2);}
.item-info{flex:1;min-width:0;}
.item-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.item-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold2);line-height:1;}
.item-val-lbl{font-size:10px;color:var(--muted);text-align:right;}
.date-badge{background:var(--forest);border:1px solid var(--border);border-radius:8px;padding:6px 8px;text-align:center;flex-shrink:0;min-width:44px;}
.date-mon{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
.date-day{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);line-height:1;}
/* AVATAR */
.avatar{border-radius:10px;overflow:hidden;flex-shrink:0;background:linear-gradient(145deg,var(--forest),var(--green));border:2px solid var(--golddim);display:flex;align-items:center;justify-content:center;position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.avatar-num{font-family:'Bebas Neue',sans-serif;color:var(--gold);line-height:1;}
.avatar.sm{width:44px;height:44px;border-radius:10px;}
.avatar.sm .avatar-num{font-size:20px;}
.avatar.lg{width:72px;height:72px;border-radius:14px;border:2px solid var(--gold);}
.avatar.lg .avatar-num{font-size:30px;}
/* PITCHER BADGE */
.pitcher-flag{background:rgba(245,200,0,.15);border:1px solid var(--golddim);border-radius:6px;padding:2px 7px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
/* SCORECARD */
.sc-wrap{overflow-x:auto;}
.scorecard{border-collapse:collapse;width:100%;font-family:'Barlow Condensed',sans-serif;}
.scorecard th{background:var(--card2);color:var(--gold);font-size:10px;font-weight:700;text-transform:uppercase;padding:6px 3px;text-align:center;border:1px solid var(--border);min-width:24px;}
.scorecard th.tc{text-align:left;padding-left:10px;min-width:80px;}
.scorecard td{background:var(--card);color:var(--cream);font-size:13px;padding:6px 3px;text-align:center;border:1px solid var(--border);}
.scorecard td.tc{text-align:left;padding-left:10px;font-weight:700;}
.scorecard td.tot{background:var(--card2);font-family:'Bebas Neue',sans-serif;font-size:18px;}
.scorecard td.tot.gold{color:var(--gold2);}
.scorecard td.tot.dim{color:var(--muted);}
.sc-inp{width:100%;background:transparent;border:none;color:var(--gold2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;padding:0;min-width:20px;}
.sc-inp.them{color:var(--muted);}
/* BOX SCORE */
.box-score{width:100%;border-collapse:collapse;}
.box-score th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 4px;text-align:center;background:var(--card2);border-bottom:1px solid var(--border);}
.box-score th.left{text-align:left;padding-left:10px;}
.box-score td{font-size:12px;font-weight:600;padding:10px 4px;text-align:center;border-bottom:1px solid #0f1f0f;color:var(--cream);font-family:'Barlow Condensed',sans-serif;}
.box-score td.left{text-align:left;padding-left:10px;}
.box-score tr:last-child td{border-bottom:none;}
.box-score tr:active td{background:var(--card2);}
.box-score td.avg-c{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold2);}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.stat-cell{background:var(--card);padding:10px 4px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--cream);}
.sv.gold{color:var(--gold2);}.sv.star{color:var(--gold3);}.sv.green{color:var(--green3);}
.sl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.rate-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.rate-cell{background:var(--card);padding:8px 4px;text-align:center;}
.rv{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green3);line-height:1;}
.rl{font-size:9px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
/* AB BUTTONS */
.ab-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.ab-btn{padding:16px 6px;border-radius:10px;border:2px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-align:center;background:var(--card2);color:var(--muted);}
.ab-btn:active{opacity:.8;}
.ab-btn.sel-hit{border-color:var(--green3);background:rgba(61,184,61,.15);color:var(--green3);}
.ab-btn.sel-out{border-color:var(--red);background:rgba(204,34,34,.15);color:var(--red);}
.ab-btn.sel-walk{border-color:#66aaff;background:rgba(34,102,204,.15);color:#66aaff;}
/* FIELD BUTTONS */
.field-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.field-btn{padding:9px 10px;border-radius:8px;border:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:var(--card2);color:var(--muted);}
.field-btn:active{opacity:.8;}
.field-btn.sel{border-color:var(--gold);background:var(--forest);color:var(--gold);}
/* AB LOG ENTRY */
.ab-entry{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #0f1f0f;gap:10px;cursor:pointer;}
.ab-entry:last-child{border-bottom:none;}
.ab-entry:active{background:var(--card2);}
.ab-badge{font-family:'Bebas Neue',sans-serif;font-size:14px;padding:3px 8px;border-radius:5px;flex-shrink:0;}
.ab-badge.hit{background:rgba(61,184,61,.2);color:var(--green3);}
.ab-badge.out{background:rgba(204,34,34,.15);color:var(--red);}
.ab-badge.walk{background:rgba(34,102,204,.15);color:#66aaff;}
/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:10px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;}
.btn:active{opacity:.8;}
.btn-gold{background:linear-gradient(180deg,var(--gold3),var(--gold));color:#0a1a0a;}
.btn-green{background:linear-gradient(180deg,var(--green2),var(--green));color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-danger{background:var(--red);color:#fff;}
.btn-full{width:100%;}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px;}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 76px);right:18px;width:56px;height:56px;border-radius:16px;background:linear-gradient(145deg,var(--gold3),var(--gold));border:none;color:#0a1a0a;font-size:30px;cursor:pointer;box-shadow:0 4px 20px rgba(245,200,0,.5);display:flex;align-items:center;justify-content:center;z-index:80;}
.fab:active{opacity:.8;}
/* SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:22px 22px 0 0;border-top:2px solid var(--gold);width:100%;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),20px);}
.sh-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:10px auto 4px;}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px;border-bottom:1px solid var(--border);}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold);}
.sh-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.sh-close{width:30px;height:30px;border-radius:50%;background:var(--card2);border:none;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-body{padding:14px 16px;}
/* FORM */
.fg{margin-bottom:12px;}
.fl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--golddim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;}
.fi,.fs{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--cream);font-family:'Barlow',sans-serif;font-size:16px;padding:10px 12px;outline:none;-webkit-appearance:none;appearance:none;}
.fi.num{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);padding:8px 4px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sdiv{display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin:14px 0 10px;}
.sdiv::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.sdiv::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
/* INN BUTTONS */
.inn-row{display:flex;gap:5px;flex-wrap:wrap;}
.inn-btn{width:34px;height:34px;border-radius:7px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:17px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.inn-btn.sel{background:var(--green2);border-color:var(--green3);color:#fff;}
/* HERO */
.hero{background:linear-gradient(135deg,var(--forest),#0a0e0a);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;color:var(--cream);}
.hero-meta{font-size:12px;color:var(--muted);margin-top:3px;}
/* LINEUP ROW */
.lu-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #0f1f0f;gap:10px;}
.lu-row:last-child{border-bottom:none;}
.lu-ord{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);width:26px;text-align:center;flex-shrink:0;}
.lu-move{display:flex;flex-direction:column;gap:2px;}
.lu-move button{background:var(--card2);border:1px solid var(--border);color:var(--muted);width:28px;height:22px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;}
/* PHOTO */
.photo-upload{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.photo-prev{width:64px;height:64px;border-radius:14px;border:2px solid var(--golddim);overflow:hidden;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.photo-prev img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.photo-prev-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);}
/* MISC */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--golddim);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;cursor:pointer;padding:0;margin-bottom:12px;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-ico{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);letter-spacing:1px;margin-bottom:6px;}
.empty-sub{font-size:14px;line-height:1.6;}
.conf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:24px;}
.conf-overlay.open{display:flex;}
.conf-box{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center;}
.conf-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);letter-spacing:1px;margin-bottom:8px;}
.conf-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.conf-btns{display:flex;gap:10px;}
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%) translateY(-16px);background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;padding:10px 22px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;z-index:300;opacity:0;transition:all .28s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.gs-u{background:rgba(245,200,0,.15);color:var(--gold);display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
.gs-l{background:rgba(61,184,61,.15);color:var(--green3);display:inline-block;padding:2px 8px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;}
.rec-bar{display:flex;gap:8px;margin-bottom:12px;}
.rec-cell{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.rec-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--gold2);}
.rec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.hint{background:var(--forest);border:1px solid var(--golddim);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
.hint-txt{font-size:13px;color:var(--muted);line-height:1.5;flex:1;}
.hint-txt b{color:var(--gold);}
.lb-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.lb-tab{background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;white-space:nowrap;}
.lb-tab.active{background:var(--gold);color:#0a1a0a;border-color:var(--gold);}
.lb-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #0f1f0f;gap:10px;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;width:28px;text-align:center;color:var(--muted);flex-shrink:0;}
.lb-rank.r1{color:var(--gold2);}.lb-rank.r2{color:#c0c0c0;}.lb-rank.r3{color:#cd7f32;}
.lb-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold2);line-height:1;margin-left:auto;}
/* TEAM DASHBOARD */
.team-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.team-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.team-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold2);line-height:1;}
.team-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- GAME MODAL -->
<div class="overlay" id="gameModal">
  <div class="sheet"><div class="sh-handle"></div>
    <div class="sh-hdr"><div><div class="sh-title" id="gmTitle">ADD GAME</div></div><button class="sh-close" onclick="closeAll()">&#10005;</button></div>
    <div class="sh-body">
      <div class="fr2">
        <div class="fg"><label class="fl">Date</label><input class="fi" id="gmDate" type="date"></div>
        <div class="fg"><label class="fl">Time</label><input class="fi" id="gmTime" type="time"></div>
      </div>
      <div class="fg"><label class="fl">Opponent</label><input class="fi" id="gmOpp" placeholder="Team name"></div>
      <div class="fg"><label class="fl">Location</label><input class="fi" id="gmLoc" placeholder="Field / Address"></div>
      <div class="fr2">
        <div class="fg"><label class="fl">Innings (default 9)</label><input class="fi num" id="gmInnings" type="number" placeholder="9" inputmode="numeric" min="1" max="20"></div>
        <div class="fg"><label class="fl">Notes</label><input class="fi" id="gmNotes" placeholder="Notes..."></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn btn-ghost btn-full" onclick="closeAll()">Cancel</button>
        <button class="btn btn-gold btn-full" onclick="saveGame()">Save Game</button>
      </div>
      <div id="delGameBtn" style="margin-top:10px;display:none;"><button class="btn btn-danger btn-full" onclick="promptDel('game')">Delete Game</button></div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="overlay" id="playerModal">
  <div class="sheet"><div class="sh-handle"></div>
    <div class="sh-hdr"><div><div class="sh-title" id="pmTitle">ADD PLAYER</div></div><button class="sh-close" onclick="closeAll()">&#10005;</button></div>
    <div class="sh-body">
      <div class="photo-upload">
        <div class="photo-prev" id="photoPrev" onclick="triggerPhoto()">
          <span class="photo-prev-num" id="photoPrevNum">?</span>
        </div>
        <div style="font-size:13px;color:var(--muted);line-height:1.6"><b style="color:var(--cream)">Player Photo</b><br>Tap to upload from camera roll.<br>Jersey # shown if no photo.</div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Jersey #</label><input class="fi num" id="pNum" type="number" placeholder="00" inputmode="numeric" oninput="updatePhotoPrev()"></div>
        <div class="fg"><label class="fl">Position</label>
          <select class="fs" id="pPos"><option value="">Pick</option><option>P</option><option>C</option><option>1B</option><option>2B</option><option>3B</option><option>SS</option><option>LF</option><option>CF</option><option>RF</option><option>DH</option><option>UTL</option></select>
        </div>
      </div>
      <div class="fg"><label class="fl">First Name</label><input class="fi" id="pFirst" placeholder="First"></div>
      <div class="fg"><label class="fl">Last Name</label><input class="fi" id="pLast" placeholder="Last"></div>
      <div class="fr2">
        <div class="fg"><label class="fl">Age</label><input class="fi" id="pAge" type="number" placeholder="10" inputmode="numeric"></div>
        <div class="fg"><label class="fl">Bats</label><select class="fs" id="pBats"><option value="">-</option><option>R</option><option>L</option><option>S</option></select></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn btn-ghost btn-full" onclick="closeAll()">Cancel</button>
        <button class="btn btn-gold btn-full" onclick="savePlayer()">Save Player</button>
      </div>
      <div id="delPlayerBtn" style="margin-top:10px;display:none;"><button class="btn btn-danger btn-full" onclick="promptDel('player')">Delete Player</button></div>
    </div>
  </div>
</div>

    <div class="sh-hdr">
      <div><div class="sh-title" id="pitchTitle">LOG PITCHING</div><div class="sh-sub" id="pitchSub"></div></div>
      <button class="sh-close" onclick="closeAll()">&#10005;</button>
    </div>
    <div class="sh-body">
      <div class="fr2">
        <div class="fg"><label class="fl">IP</label><input class="fi num" id="ptIP" type="number" placeholder="0.0" inputmode="decimal" step="0.1"></div>
        <div class="fg"><label class="fl">Decision</label>
          <select class="fs" id="ptResult"><option value="">-</option><option value="W">Win (W)</option><option value="L">Loss (L)</option><option value="S">Save (S)</option><option value="ND">No Decision</option></select>
        </div>

        <div class="fg"><label class="fl" style="text-align:center">R</label><input class="fi num" id="ptR" type="number" placeholder="0" inputmode="numeric"></div>

      <div class="fr2">
        <div class="fg"><label class="fl">ER (Earned Runs)</label><input class="fi num" id="ptER" type="number" placeholder="0" inputmode="numeric"></div>

      </div>
      <div class="fg"><label class="fl">Notes</label><input class="fi" id="ptNotes" placeholder="Strong outing..."></div>

        <button class="btn btn-green btn-full" onclick="savePitch()">Save Pitching</button>

    </div>

</div>

<!-- SETTINGS -->
<div class="overlay" id="settingsModal">
  <div class="sheet"><div class="sh-handle"></div>
    <div class="sh-hdr"><div class="sh-title">SETTINGS</div><button class="sh-close" onclick="closeAll()">&#10005;</button></div>
    <div class="sh-body">
      <div class="fg"><label class="fl">Season</label><input class="fi" id="sSeason" placeholder="e.g. Spring 2025"></div>
      <div style="display:flex;gap:10px;margin-top:4px;">
        <button class="btn btn-ghost btn-full" onclick="closeAll()">Cancel</button>
        <button class="btn btn-gold btn-full" onclick="saveSeason()">Save</button>
      </div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <div class="fl" style="margin-bottom:10px;">Data</div>
        <button class="btn btn-ghost btn-full btn-sm" onclick="exportCSV()" style="margin-bottom:8px;">Export to Excel / Numbers</button>
        <button class="btn btn-ghost btn-full btn-sm" onclick="exportJSON()" style="margin-bottom:8px;">Backup Data</button>
        <button class="btn btn-ghost btn-full btn-sm" onclick="toggleImport()">Restore Backup</button>

          <textarea class="fi" id="importJSON" rows="4" placeholder="Paste backup JSON here..." style="font-size:12px;resize:none;height:80px;"></textarea>
          <button class="btn btn-green btn-full btn-sm" style="margin-top:8px;" onclick="importData()">Restore</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="conf-overlay" id="confirmOverlay">
  <div class="conf-box">
    <div class="conf-title" id="confTitle">CONFIRM</div>
    <div class="conf-sub" id="confSub">This cannot be undone.</div>
    <div class="conf-btns">
      <button class="btn btn-ghost btn-full" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-full" id="confOK">Delete</button>
    </div>
  </div>
</div>

<script>
var LS='gs_v8';
var S={season:'Spring 2025',players:[],games:[],atbats:[],pitching:[]};
var tab='schedule',curPid=null,curGid=null;
var editPid=null,editGid=null,editAbId=null,editPitchId=null;
var abPid=null,abGid=null,abInn=1,abResult=null,abDir=null,abBallType=null;
var luDraft=[],luPitcher=null;
var pendingPhoto=null,lbCat='avg';

// ── PERSIST ──
function load(){try{var r=localStorage.getItem(LS);if(r){var d=JSON.parse(r);S.season=d.season||'Spring 2025';S.players=d.players||[];S.games=d.games||[];S.atbats=d.atbats||[];S.pitching=d.pitching||[];}}catch(e){}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function n(v){return parseFloat(v)||0;}

// ── HELPERS ──
function pname(p){return((p.first||'')+' '+(p.last||'')).trim()||'Player';}
function fmtDate(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function monLbl(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short'}).toUpperCase();}
function dayLbl(d){if(!d)return'';return new Date(d+'T12:00:00').getDate();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2400);}

// ── AT-BAT HELPERS ──
var HITS=['1B','2B','3B','HR','GS'];
var OUTS=['K','FO','GO','LO','SAC','E'];
var WALKS=['BB'];
function isHit(r){return HITS.indexOf(r)>=0;}
function isOut(r){return OUTS.indexOf(r)>=0;}
function isWalk(r){return WALKS.indexOf(r)>=0;}
function rlabel(r){
  var m={'1B':'1B','2B':'2B','3B':'3B','HR':'HR','GS':'GRAND SLAM','BB':'BB','K':'K','FO':'FO','GO':'GO','LO':'LO','SAC':'SAC','E':'E'};
  return m[r]||r||'-';
}
function rclass(r){if(isHit(r))return'hit';if(isWalk(r))return'walk';return'out';}

// ── AVATAR ──
function avHTML(p,size){
  var s=size==='lg'?'lg':'sm';
  var inner=p&&p.photo?'<img src="'+p.photo+'" alt="">':'<span class="avatar-num">'+(p?p.num||'?':'?')+'</span>';
  return'<div class="avatar '+s+'">'+inner+'</div>';
}
function avSm(p){return avHTML(p,'sm');}
function avLg(p){return avHTML(p,'lg');}

// ── AGGREGATION ──
function aggBat(pid,gid){
  var abs=S.atbats.filter(function(a){return a.playerId===pid&&(!gid||a.gameId===gid);});
  var ab=0,h=0,h1=0,h2=0,h3=0,hr=0,gs=0,bb=0,k=0,rbi=0,sb=0,r=0,tb=0;
  for(var i=0;i<abs.length;i++){
    var a=abs[i];
    if(isWalk(a.result)){bb++;}
    else{ab++;}
    if(a.result==='1B'){h++;h1++;tb+=1;}
    else if(a.result==='2B'){h++;h2++;tb+=2;}
    else if(a.result==='3B'){h++;h3++;tb+=3;}
    else if(a.result==='HR'){h++;hr++;tb+=4;}
    else if(a.result==='GS'){h++;hr++;gs++;tb+=4;rbi+=4;}// grand slam always 4 RBI base
    if(a.result==='K')k++;
    rbi+=n(a.rbi);sb+=n(a.sb);r+=n(a.r||0);
  }
  var pa=ab+bb;
  var avg=ab?'.'+String(Math.round(h/ab*1000)).padStart(3,'0'):'.000';
  var obp=pa?'.'+String(Math.round((h+bb)/pa*1000)).padStart(3,'0'):'.000';
  var slg=ab?'.'+String(Math.round(tb/ab*1000)).padStart(3,'0'):'.000';
  var ops_n=(parseFloat(obp)+parseFloat(slg));
  var ops='.'+String(Math.round(ops_n*1000)).padStart(3,'0');
  var games=gid?1:new Set(abs.map(function(a){return a.gameId;})).size;
  return{games:games,pas:abs.length,ab:ab,h:h,h1:h1,h2:h2,h3:h3,hr:hr,gs:gs,bb:bb,k:k,rbi:rbi,sb:sb,r:r,tb:tb,avg:avg,obp:obp,slg:slg,ops:ops};
}
function aggPitch(pid,gid){
  var ps=S.pitching.filter(function(p){return p.playerId===pid&&(!gid||p.gameId===gid);});
  var ip=0,er=0,r=0,h=0,bb=0,k=0,w=0,l=0,sv=0,pc=0;
  for(var i=0;i<ps.length;i++){
    var p=ps[i];ip+=n(p.ip);er+=n(p.er);r+=n(p.r);h+=n(p.h);bb+=n(p.bb);k+=n(p.k);pc+=n(p.pitches);
    if(p.result==='W')w++;else if(p.result==='L')l++;else if(p.result==='S')sv++;
  }
  var era=ip?((er/ip)*9).toFixed(2):'-.--';
  var whip=ip?((bb+h)/ip).toFixed(2):'-.--';
  return{games:ps.length,ip:ip,er:er,r:r,h:h,bb:bb,k:k,w:w,l:l,sv:sv,pc:pc,era:era,whip:whip};
}
function getInn(g){
  var cnt=g.innings||9;
  var us=g.usInnings?g.usInnings.slice():[];
  var them=g.themInnings?g.themInnings.slice():[];
  while(us.length<cnt)us.push(0);
  while(them.length<cnt)them.push(0);
  return{us:us,them:them,cnt:cnt};
}
function sumArr(a){return a.reduce(function(x,v){return x+n(v);},0);}
function getLineup(g){
  if(g&&g.lineup&&g.lineup.length)return g.lineup;
  return S.players.map(function(p){return{pid:p.id,pitcher:false};});
}
function getGamePitcher(g){
  var lu=getLineup(g);
  for(var i=0;i<lu.length;i++){if(lu[i].pitcher)return lu[i].pid;}
  return null;
}

// ── NAV ──
function showTab(t){
  var ss=document.querySelectorAll('.screen');for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');
  var ns=document.querySelectorAll('.nav-btn');for(var i=0;i<ns.length;i++)ns[i].classList.remove('active');
  var sid=t==='player'?'screen-player':t==='gamedetail'?'screen-gamedetail':'screen-'+t;
  document.getElementById(sid).classList.add('active');
  var nb=document.getElementById('nav-'+t);if(nb)nb.classList.add('active');
  tab=t;updateFab();
  if(t==='schedule')renderSchedule();
  if(t==='roster')renderRoster();
  if(t==='team')renderTeam();
  if(t==='leaders')renderLeaders();
  if(t==='player')renderPlayerDetail();
  if(t==='gamedetail')renderGameDetail();
}
function updateFab(){
  var f=document.getElementById('mainFab');
  if(tab==='schedule'||tab==='roster'){f.textContent='+';f.style.display='flex';}
  else{f.style.display='none';}
}
function fabAction(){
  if(tab==='schedule')openGameModal(null);
  else if(tab==='roster')openPlayerModal(null);
}
function closeAll(){var ms=document.querySelectorAll('.overlay');for(var i=0;i<ms.length;i++)ms[i].classList.remove('open');}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');}
function showConfirm(title,sub,cb){document.getElementById('confTitle').textContent=title;document.getElementById('confSub').textContent=sub;document.getElementById('confOK').onclick=cb;document.getElementById('confirmOverlay').classList.add('open');}

// ── INSTALL HINT ──
function dismissHint(){localStorage.setItem('gs_hint','1');var h=document.getElementById('installHint');if(h)h.innerHTML='';}
function renderHint(){
  var el=document.getElementById('installHint');if(!el)return;
  if(localStorage.getItem('gs_hint')||(window.navigator&&window.navigator.standalone)){el.innerHTML='';return;}
  el.innerHTML='<div class="hint"><div style="font-size:20px;flex-shrink:0">&#128242;</div>'
    +'<div class="hint-txt"><b>Add to Home Screen</b> &#8212; Tap <b>Share &#8593;</b> in Safari &#8594; <b>Add to Home Screen</b></div>'
    +'<button style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;align-self:center;flex-shrink:0" onclick="dismissHint()">&#10005;</button></div>';
}

// ── SETTINGS ──
function openSettings(){closeAll();document.getElementById('sSeason').value=S.season;document.getElementById('settingsModal').classList.add('open');}
function saveSeason(){S.season=document.getElementById('sSeason').value.trim()||'Spring 2025';save();closeAll();toast('Saved!');}
function toggleImport(){var a=document.getElementById('importArea');a.style.display=a.style.display==='none'?'block':'none';}
function exportCSV(){
  if(!S.players.length){toast('No data');return;}
  var rows=['Name,#,Pos,G,AB,H,1B,2B,3B,HR,GS,AVG,OBP,SLG,OPS,RBI,R,BB,K,SB'];
  for(var i=0;i<S.players.length;i++){var p=S.players[i],b=aggBat(p.id);rows.push(['"'+pname(p)+'"',p.num||'',p.pos||'',b.games,b.ab,b.h,b.h1,b.h2,b.h3,b.hr,b.gs,b.avg,b.obp,b.slg,b.ops,b.rbi,b.r,b.bb,b.k,b.sb].join(','));}
  rows.push('');rows.push('PITCHING');rows.push('Name,#,G,W,L,SV,IP,ER,ERA,WHIP,K,BB,H,R,Pitches');
  for(var i=0;i<S.players.length;i++){var p=S.players[i],pt=aggPitch(p.id);if(pt.games>0)rows.push(['"'+pname(p)+'"',p.num||'',pt.games,pt.w,pt.l,pt.sv,pt.ip,pt.er,pt.era,pt.whip,pt.k,pt.bb,pt.h,pt.r,pt.pc].join(','));}
  var csv=rows.join('\n');
  try{var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='GoldenStars.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Exported!');}
  catch(e){document.getElementById('importJSON').value=csv;document.getElementById('importArea').style.display='block';toast('Copy from text box');}
}
function exportJSON(){
  var json=JSON.stringify(S,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(json).then(function(){toast('Backup copied!');});}
  else{document.getElementById('importJSON').value=json;document.getElementById('importArea').style.display='block';}
}
function importData(){
  try{var raw=document.getElementById('importJSON').value.trim();var d=JSON.parse(raw);
    if(d.players){S={season:d.season||'Spring 2025',players:d.players,games:d.games||[],atbats:d.atbats||[],pitching:d.pitching||[]};save();closeAll();showTab('schedule');toast('Restored!');}
    else toast('Invalid format');}
  catch(e){toast('Could not parse');}
}

// ── SCHEDULE ──
function renderSchedule(){
  renderHint();
  var el=document.getElementById('scheduleContent');
  if(!S.games.length){el.innerHTML='<div class="empty"><div class="empty-ico">&#128197;</div><div class="empty-title">No Games Yet</div><div class="empty-sub">Tap <b style="color:var(--gold)">+</b> to schedule your first game</div></div>';return;}
  var sorted=S.games.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var w=0,l=0,ti=0;
  for(var i=0;i<sorted.length;i++){var g=sorted[i];var inn=getInn(g);var us=sumArr(inn.us),them=sumArr(inn.them);if(us||them){if(us>them)w++;else if(us<them)l++;else ti++;}}
  var html='<div class="rec-bar">'
    +'<div class="rec-cell"><div class="rec-val" style="color:var(--green3)">'+w+'</div><div class="rec-lbl">Wins</div></div>'
    +'<div class="rec-cell"><div class="rec-val" style="color:var(--red)">'+l+'</div><div class="rec-lbl">Losses</div></div>'
    +'<div class="rec-cell"><div class="rec-val">'+ti+'</div><div class="rec-lbl">Ties</div></div>'
    +'<div class="rec-cell"><div class="rec-val">'+sorted.length+'</div><div class="rec-lbl">Games</div></div></div>'
    +'<div class="card"><div class="card-head"><span class="card-title">'+S.season+'</span></div>';
  for(var i=0;i<sorted.length;i++){
    var g=sorted[i];var inn=getInn(g);var us=sumArr(inn.us),them=sumArr(inn.them);
    var cnt=S.atbats.filter(function(a){return a.gameId===g.id;}).length;
    var score=(us||them)?us+'-'+them:'';
    var logged=cnt>0;
    html+='<div class="row-item" data-action="game" data-id="'+g.id+'">'
      +'<div class="date-badge"><div class="date-mon">'+monLbl(g.date)+'</div><div class="date-day">'+dayLbl(g.date)+'</div></div>'
      +'<div class="item-info"><div class="item-name">vs. '+(g.opp||'TBD')+'</div>'
      +'<div class="item-sub">'+(g.loc||'')+(g.time?' &middot; '+g.time:'')+' &middot; '+g.innings+' inn &middot; '+cnt+' AB</div></div>'
      +'<div style="text-align:right">'
      +(score?'<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:var(--gold)">'+score+'</div>':'')
      +'<span class="'+(logged?'gs-l':'gs-u')+'">'+(logged?'Active':'Upcoming')+'</span></div></div>';
  }
  html+='</div>';el.innerHTML=html;
  addClick(el,'[data-action="game"]',function(el){openGameDetail(el.getAttribute('data-id'));});
}

// ── GAME MODAL ──
function openGameModal(gid){
  closeAll();editGid=gid;
  var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===gid){g=S.games[i];break;}}
  document.getElementById('gmTitle').textContent=g?'EDIT GAME':'ADD GAME';
  document.getElementById('gmDate').value=g?g.date:new Date().toISOString().slice(0,10);
  document.getElementById('gmTime').value=g?(g.time||''):'';
  document.getElementById('gmOpp').value=g?(g.opp||''):'';
  document.getElementById('gmLoc').value=g?(g.loc||''):'';
  document.getElementById('gmInnings').value=g?(g.innings||9):9;
  document.getElementById('gmNotes').value=g?(g.notes||''):'';
  document.getElementById('delGameBtn').style.display=g?'block':'none';
  document.getElementById('gameModal').classList.add('open');
}
function saveGame(){
  var date=document.getElementById('gmDate').value;if(!date){toast('Pick a date');return;}
  var innings=parseInt(document.getElementById('gmInnings').value)||9;
  var data={date:date,time:document.getElementById('gmTime').value,opp:document.getElementById('gmOpp').value.trim(),
    loc:document.getElementById('gmLoc').value.trim(),innings:innings,notes:document.getElementById('gmNotes').value.trim()};
  if(editGid){
    var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===editGid){g=S.games[i];break;}}
    var ui=g.usInnings||[];var ti=g.themInnings||[];
    while(ui.length<innings)ui.push(0);while(ti.length<innings)ti.push(0);
    data.usInnings=ui;data.themInnings=ti;data.lineup=g.lineup||[];
    Object.assign(g,data);
  } else {
    data.id=uid();data.usInnings=[];data.themInnings=[];
    for(var i=0;i<innings;i++){data.usInnings.push(0);data.themInnings.push(0);}
    data.lineup=S.players.map(function(p){return{pid:p.id,pitcher:false};});
    S.games.push(data);
  }
  save();closeAll();toast(editGid?'Game updated!':'Game added!');renderSchedule();
}

// ── GAME DETAIL ──
function openGameDetail(gid){curGid=gid;showTab('gamedetail');}
function renderGameDetail(){
  var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===curGid){g=S.games[i];break;}}
  if(!g){showTab('schedule');return;}
  var inn=getInn(g);var usT=sumArr(inn.us),themT=sumArr(inn.them);
  var gabs=S.atbats.filter(function(a){return a.gameId===g.id;});
  var tH=0,tAB=0,tRBI=0,tR=0;
  for(var i=0;i<gabs.length;i++){
    if(isHit(gabs[i].result))tH++;
    if(!isWalk(gabs[i].result))tAB++;
    tRBI+=n(gabs[i].rbi);tR+=n(gabs[i].r||0);
  }
  var lineup=getLineup(g);

  // SCORECARD
  var innH='<th class="tc">Team</th>';for(var i=0;i<inn.cnt;i++)innH+='<th>'+(i+1)+'</th>';innH+='<th>R</th><th>H</th>';
  var usR='<td class="tc" style="color:var(--gold2);font-weight:700">&#11088; Stars</td>';
  for(var i=0;i<inn.cnt;i++)usR+='<td><input class="sc-inp" type="number" min="0" max="99" value="'+n(inn.us[i])+'" data-team="us" data-inn="'+i+'" inputmode="numeric"></td>';
  usR+='<td class="tot gold">'+usT+'</td><td class="tot gold">'+tH+'</td>';
  var themR='<td class="tc" style="color:var(--muted)">'+(g.opp||'Opponent')+'</td>';
  for(var i=0;i<inn.cnt;i++)themR+='<td><input class="sc-inp them" type="number" min="0" max="99" value="'+n(inn.them[i])+'" data-team="them" data-inn="'+i+'" inputmode="numeric"></td>';
  themR+='<td class="tot dim">'+themT+'</td><td class="tot dim">-</td>';
  var scorecard='<div class="card" style="margin-bottom:12px;">'
    +'<div class="card-head"><span class="card-title">&#127942; Scorecard &mdash; '+inn.cnt+' Inn</span>'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-ghost btn-sm" data-action="lineup">&#128203; Lineup</button>'
    +'<button class="btn btn-ghost btn-sm" data-action="editgame">Edit</button></div></div>'
    +'<div class="sc-wrap"><table class="scorecard"><thead><tr>'+innH+'</tr></thead>'
    +'<tbody><tr>'+usR+'</tr><tr>'+themR+'</tr></tbody></table></div></div>';

  // TEAM TOTALS
  var totals='';
  if(gabs.length){
    totals='<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">&#9889; Team Totals</span></div>'
      +'<div class="stat-grid">'
      +'<div class="stat-cell"><div class="sv star">'+(tAB?'.'+String(Math.round(tH/tAB*1000)).padStart(3,'0'):'.000')+'</div><div class="sl">AVG</div></div>'
      +'<div class="stat-cell"><div class="sv gold">'+tH+'</div><div class="sl">Hits</div></div>'

      +'<div style="font-size:10px;color:var(--muted)">'+(p.pos||'-')

      +'<td>'+(hasBat?b.h+'-'+b.ab:'&#8212;')+'</td>'

      +'<td>'+(hasBat&&b.hr?b.hr:'&#8212;')+'</td>'

      +(isPitcher?'<button style="background:var(--golddim);border:none;color:#0a1a0a;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;cursor:pointer;margin-left:4px;white-space:nowrap" data-action="addpitch" data-pid="'+p.id+'">&#9876;</button>':'')
      +'</td></tr>';
  }

  // add players not in lineup
  var inLineup={};for(var i=0;i<lineup.length;i++)inLineup[lineup[i].pid]=true;
  for(var i=0;i<S.players.length;i++){
    if(!inLineup[S.players[i].id]){
      var p=S.players[i];
      tableRows+='<tr data-action="openplayer" data-pid="'+p.id+'">'
        +'<td style="color:var(--border);text-align:center">-</td>'
        +'<td class="left"><div style="display:flex;align-items:center;gap:7px;">'+avSm(p)
        +'<div style="font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;color:var(--muted)">'+pname(p)+'</div></div></td>'
        +'<td colspan="5" style="color:var(--muted);font-size:12px">Not in lineup</td></tr>';
    }
  }

  var table=S.players.length
    ?'<div class="card"><div class="card-head"><span class="card-title">&#128203; Box Score</span>'
     +'<button class="btn btn-ghost btn-sm" data-action="addpitchopen">&#9876; Pitching</button></div>'
     +'<div style="overflow-x:auto;"><table class="box-score" style="min-width:100%"><thead><tr>'
     +'<th style="width:16px">#</th><th class="left">Player</th>'
     +'<th>H-AB</th><th>RBI</th><th>HR</th><th>AVG</th><th>+</th>'
     +'</tr></thead><tbody>'+tableRows+'</tbody></table></div></div>'
    :'<div class="card" style="padding:20px;text-align:center;color:var(--muted)">Add players to roster first</div>';

  var el=document.getElementById('gameDetailContent');
  el.innerHTML='<div class="hero"><div style="flex:1">'
    +'<div class="hero-name">vs. '+(g.opp||'TBD')+'</div>'
    +'<div class="hero-meta">'+fmtDate(g.date)+(g.time?' &middot; '+g.time:'')+(g.loc?' &middot; '+g.loc:'')+'</div>'
    +'</div></div>'+scorecard+totals+table;

  // SCORECARD INPUT EVENTS
  var scInps=el.querySelectorAll('.sc-inp');
  for(var i=0;i<scInps.length;i++){(function(inp){inp.addEventListener('change',function(){
    var team=inp.getAttribute('data-team'),idx=parseInt(inp.getAttribute('data-inn'));
    var gObj=null;for(var j=0;j<S.games.length;j++){if(S.games[j].id===curGid){gObj=S.games[j];break;}}
    if(!gObj)return;
    var inn2=getInn(gObj);
    if(team==='us')inn2.us[idx]=n(inp.value);else inn2.them[idx]=n(inp.value);
    gObj.usInnings=inn2.us;gObj.themInnings=inn2.them;save();
    var tots=el.querySelectorAll('.tot');
    if(tots[0])tots[0].textContent=sumArr(inn2.us);
    if(tots[2])tots[2].textContent=sumArr(inn2.them);
  });})(scInps[i]);}

  addClick(el,'[data-action="addab"]',function(btn){openABModal(curGid,btn.getAttribute('data-pid'),null);});
  addClick(el,'[data-action="addpitch"]',function(btn){openPitchModal(curGid,btn.getAttribute('data-pid'),null);});
  addClick(el,'[data-action="addpitchopen"]',function(){openPitchModal(curGid,null,null);});
  addClick(el,'[data-action="openplayer"]',function(row){if(event.target.tagName==='BUTTON')return;curPid=row.getAttribute('data-pid');showTab('player');});
  var lb=el.querySelector('[data-action="lineup"]');if(lb)lb.addEventListener('click',function(){openLineup(curGid);});
  var eb=el.querySelector('[data-action="editgame"]');if(eb)eb.addEventListener('click',function(){openGameModal(curGid);});
}

// ── LINEUP ──
function openLineup(gid){
  closeAll();curGid=gid;
  var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===gid){g=S.games[i];break;}}
  if(!g)return;
  document.getElementById('lineupSub').textContent='vs. '+(g.opp||'TBD')+' &middot; '+fmtDate(g.date);
  luDraft=getLineup(g).slice();
  luPitcher=getGamePitcher(g);
  // Ensure all players are in draft
  for(var i=0;i<S.players.length;i++){
    var found=false;for(var j=0;j<luDraft.length;j++){if(luDraft[j].pid===S.players[i].id){found=true;break;}}
    if(!found)luDraft.push({pid:S.players[i].id,pitcher:false});
  }
  renderLineupList();
  document.getElementById('lineupModal').classList.add('open');
}
function renderLineupList(){
  var wrap=document.getElementById('lineupList');
  var html='<div class="card">';
  for(var i=0;i<luDraft.length;i++){
    var lu=luDraft[i];var p=null;for(var j=0;j<S.players.length;j++){if(S.players[j].id===lu.pid){p=S.players[j];break;}}
    if(!p)continue;
    html+='<div class="lu-row">'
      +'<div class="lu-ord">'+(i+1)+'</div>'
      +avSm(p)
      +'<div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-size:15px;font-weight:700">'+pname(p)
      +(lu.pitcher?' <span class="pitcher-flag">PITCHER</span>':'')+'</div>'
      +'<div style="font-size:11px;color:var(--muted)">#'+(p.num||'?')+' '+(p.pos||'-')+'</div></div>'
      +'<button style="background:'+(lu.pitcher?'var(--golddim)':'var(--card2)')+';border:1px solid '+(lu.pitcher?'var(--gold)':'var(--border)')+';color:'+(lu.pitcher?'#0a1a0a':'var(--muted)')+';font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;margin-right:6px;white-space:nowrap" data-action="togglepitch" data-idx="'+i+'">'+(lu.pitcher?'&#9876; Pitcher':'Set P')+'</button>'
      +'<div class="lu-move">'
      +(i>0?'<button data-action="up" data-idx="'+i+'">&#9650;</button>':'<button disabled style="opacity:.2">&#9650;</button>')
      +(i<luDraft.length-1?'<button data-action="down" data-idx="'+i+'">&#9660;</button>':'<button disabled style="opacity:.2">&#9660;</button>')
      +'</div></div>';
  }
  html+='</div>';wrap.innerHTML=html;
  addClick(wrap,'[data-action="up"]',function(btn){var idx=parseInt(btn.getAttribute('data-idx'));var tmp=luDraft[idx-1];luDraft[idx-1]=luDraft[idx];luDraft[idx]=tmp;renderLineupList();});
  addClick(wrap,'[data-action="down"]',function(btn){var idx=parseInt(btn.getAttribute('data-idx'));var tmp=luDraft[idx+1];luDraft[idx+1]=luDraft[idx];luDraft[idx]=tmp;renderLineupList();});
  addClick(wrap,'[data-action="togglepitch"]',function(btn){
    var idx=parseInt(btn.getAttribute('data-idx'));
    // only one pitcher at a time
    for(var i=0;i<luDraft.length;i++)luDraft[i].pitcher=false;
    luDraft[idx].pitcher=!false;
    renderLineupList();
  });
}
function saveLineup(){
  var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===curGid){g=S.games[i];break;}}
  if(g){g.lineup=luDraft.slice();save();toast('Lineup saved!');}
  closeAll();renderGameDetail();
}

// ── AT-BAT MODAL ──
function openABModal(gid,pid,abid){
  closeAll();abGid=gid;abPid=pid;editAbId=abid;
  abResult=null;abDir=null;abBallType=null;
  var p=null;for(var i=0;i<S.players.length;i++){if(S.players[i].id===pid){p=S.players[i];break;}}
  var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===gid){g=S.games[i];break;}}
  var ab=null;if(abid){for(var i=0;i<S.atbats.length;i++){if(S.atbats[i].id===abid){ab=S.atbats[i];break;}}}
  var maxInn=g?g.innings||9:9;
  abInn=ab?ab.inning:1;
  document.getElementById('abTitle').textContent=ab?'EDIT AT-BAT':'LOG AT-BAT';
  document.getElementById('abSub').textContent=(p?pname(p)+(p.num?' #'+p.num:''):'');
  // Inning selector
  var innH='';for(var i=1;i<=maxInn;i++)innH+='<button class="inn-btn'+(i===abInn?' sel':'')+'" data-inn="'+i+'">'+i+'</button>';
  document.getElementById('abInnRow').innerHTML=innH;
  var innBtns=document.getElementById('abInnRow').querySelectorAll('.inn-btn');
  for(var i=0;i<innBtns.length;i++){(function(btn){btn.addEventListener('click',function(){abInn=parseInt(btn.getAttribute('data-inn'));var all=document.getElementById('abInnRow').querySelectorAll('.inn-btn');for(var j=0;j<all.length;j++)all[j].classList.remove('sel');btn.classList.add('sel');});})(innBtns[i]);}
  // Reset result buttons
  var rBtns=document.querySelectorAll('.ab-btn');for(var i=0;i<rBtns.length;i++)rBtns[i].className='ab-btn';
  document.getElementById('fieldWrap').style.display='none';
  // Pre-fill edit
  if(ab){
    abResult=ab.result;abDir=ab.dir;abBallType=ab.ballType;
    var rBtns2=document.querySelectorAll('.ab-btn');
    for(var i=0;i<rBtns2.length;i++){if(rBtns2[i].getAttribute('data-r')===ab.result){rBtns2[i].classList.add('sel-'+rclass(ab.result));break;}}
    if(ab.result!=='BB'&&ab.result!=='K'){
      document.getElementById('fieldWrap').style.display='block';
      if(ab.dir){var dBtns=document.querySelectorAll('[data-d]');for(var i=0;i<dBtns.length;i++){if(dBtns[i].getAttribute('data-d')===ab.dir)dBtns[i].classList.add('sel');}}
      if(ab.ballType){var tBtns=document.querySelectorAll('[data-t]');for(var i=0;i<tBtns.length;i++){if(tBtns[i].getAttribute('data-t')===ab.ballType)tBtns[i].classList.add('sel');}}
    }
  }
  document.getElementById('abRBI').value=ab?(ab.rbi||''):'';
  document.getElementById('abSB').value=ab?(ab.sb||''):'';
  document.getElementById('abNotes').value=ab?(ab.notes||''):'';
  document.getElementById('delABBtn').style.display=ab?'block':'none';
  document.getElementById('abModal').classList.add('open');
}
function pickResult(btn,cls){
  var all=document.querySelectorAll('.ab-btn');for(var i=0;i<all.length;i++)all[i].className='ab-btn';
  btn.classList.add('sel-'+cls);abResult=btn.getAttribute('data-r');
  var showField=(abResult!=='BB'&&abResult!=='K'&&abResult!=='SAC');
  document.getElementById('fieldWrap').style.display=showField?'block':'none';
}
function pickField(btn,which){
  if(which==='dir'){var all=document.querySelectorAll('[data-d]');for(var i=0;i<all.length;i++)all[i].classList.remove('sel');btn.classList.add('sel');abDir=btn.getAttribute('data-d');}
  else{var all=document.querySelectorAll('[data-t]');for(var i=0;i<all.length;i++)all[i].classList.remove('sel');btn.classList.add('sel');abBallType=btn.getAttribute('data-t');}
}
function saveAB(){
  if(!abResult){toast('Select a result first');return;}
  var data={playerId:abPid,gameId:abGid,inning:abInn,result:abResult,dir:abDir,ballType:abBallType,
    rbi:document.getElementById('abRBI').value,sb:document.getElementById('abSB').value,
    notes:document.getElementById('abNotes').value.trim()};
  if(editAbId){for(var i=0;i<S.atbats.length;i++){if(S.atbats[i].id===editAbId){Object.assign(S.atbats[i],data);break;}}}
  else{data.id=uid();S.atbats.push(data);}
  save();closeAll();toast(editAbId?'Updated!':'At-bat logged!');
  if(tab==='gamedetail')renderGameDetail();else if(tab==='player')renderPlayerDetail();
}

// ── PITCHING MODAL ──
function openPitchModal(gid,pid,ptid){
  closeAll();
  var pitchGid=gid;var pitchPid=pid;editPitchId=ptid;
  var pt=null;if(ptid){for(var i=0;i<S.pitching.length;i++){if(S.pitching[i].id===ptid){pt=S.pitching[i];break;}}}
  // If no pid, check if game has assigned pitcher
  if(!pitchPid&&!pt){
    var g=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===gid){g=S.games[i];break;}}
    pitchPid=getGamePitcher(g)||null;
  }
  if(pt)pitchPid=pt.playerId;
  var p=null;if(pitchPid){for(var i=0;i<S.players.length;i++){if(S.players[i].id===pitchPid){p=S.players[i];break;}}}
  document.getElementById('pitchTitle').textContent=pt?'EDIT PITCHING':'LOG PITCHING';
  document.getElementById('pitchSub').textContent=p?pname(p)+(p.num?' #'+p.num:''):'';
  // Pitcher selector if no assigned pitcher
  var body=document.getElementById('pitchModal').querySelector('.sh-body');
  var existSel=document.getElementById('pitcherSel');if(existSel)existSel.remove();
  if(!p){
    var div=document.createElement('div');div.id='pitcherSel';div.className='fg';
    div.innerHTML='<label class="fl">Pitcher</label><select class="fs" id="pitcherSelEl"></select>';
    body.insertBefore(div,body.firstChild);
    var sel=document.getElementById('pitcherSelEl');sel.innerHTML='';
    for(var i=0;i<S.players.length;i++){var op=document.createElement('option');op.value=S.players[i].id;op.textContent=(S.players[i].num?'#'+S.players[i].num+' ':'')+pname(S.players[i]);sel.appendChild(op);}
    if(pt)sel.value=pt.playerId;
  }
  // Store refs
  document.getElementById('pitchModal')._gid=pitchGid;
  document.getElementById('pitchModal')._pid=pitchPid;
  document.getElementById('ptIP').value=pt?(pt.ip||''):'';
  document.getElementById('ptResult').value=pt?(pt.result||''):'';
  document.getElementById('ptK').value=pt?(pt.k||''):'';
  document.getElementById('ptBB').value=pt?(pt.bb||''):'';
  document.getElementById('ptH').value=pt?(pt.h||''):'';
  document.getElementById('ptR').value=pt?(pt.r||''):'';
  document.getElementById('ptER').value=pt?(pt.er||''):'';
  document.getElementById('ptPC').value=pt?(pt.pitches||''):'';
  document.getElementById('ptNotes').value=pt?(pt.notes||''):'';
  document.getElementById('delPitchBtn').style.display=pt?'block':'none';
  document.getElementById('pitchModal').classList.add('open');
}
function savePitch(){
  var modal=document.getElementById('pitchModal');
  var gid=modal._gid;var pid=modal._pid;
  if(!pid){var sel=document.getElementById('pitcherSelEl');if(sel)pid=sel.value;}
  if(!pid){toast('Select a pitcher');return;}
  var data={playerId:pid,gameId:gid,ip:document.getElementById('ptIP').value,
    result:document.getElementById('ptResult').value,k:document.getElementById('ptK').value,
    bb:document.getElementById('ptBB').value,h:document.getElementById('ptH').value,
    r:document.getElementById('ptR').value,er:document.getElementById('ptER').value,
    pitches:document.getElementById('ptPC').value,notes:document.getElementById('ptNotes').value.trim()};
  if(editPitchId){for(var i=0;i<S.pitching.length;i++){if(S.pitching[i].id===editPitchId){Object.assign(S.pitching[i],data);break;}}}
  else{data.id=uid();S.pitching.push(data);}
  save();closeAll();toast(editPitchId?'Updated!':'Pitching logged!');
  if(tab==='gamedetail')renderGameDetail();else if(tab==='player')renderPlayerDetail();
}

// ── DELETE ──
function promptDel(what){
  var titles={game:'Delete Game?',player:'Delete Player?',ab:'Delete At-Bat?',pitch:'Delete Pitching Entry?'};
  var subs={game:'All at-bats and pitching for this game will be deleted.',player:'All stats for this player will be deleted.',ab:'This at-bat entry will be removed.',pitch:'This pitching entry will be removed.'};
  showConfirm(titles[what],subs[what],function(){
    if(what==='game'){S.atbats=S.atbats.filter(function(a){return a.gameId!==editGid;});S.pitching=S.pitching.filter(function(p){return p.gameId!==editGid;});S.games=S.games.filter(function(g){return g.id!==editGid;});save();closeAll();closeConfirm();toast('Deleted');showTab('schedule');}
    else if(what==='player'){S.atbats=S.atbats.filter(function(a){return a.playerId!==editPid;});S.pitching=S.pitching.filter(function(p){return p.playerId!==editPid;});S.players=S.players.filter(function(p){return p.id!==editPid;});save();closeAll();closeConfirm();toast('Deleted');showTab('roster');}
    else if(what==='ab'){S.atbats=S.atbats.filter(function(a){return a.id!==editAbId;});save();closeAll();closeConfirm();toast('Deleted');if(tab==='gamedetail')renderGameDetail();else renderPlayerDetail();}
    else if(what==='pitch'){S.pitching=S.pitching.filter(function(p){return p.id!==editPitchId;});save();closeAll();closeConfirm();toast('Deleted');if(tab==='gamedetail')renderGameDetail();else renderPlayerDetail();}
  });
}

function updatePhotoPrev(){var v=document.getElementById('pNum').value||'?';var el=document.getElementById('photoPrevNum');if(el)el.textContent=v;}
function triggerPhoto(){document.getElementById('photoInput').click();}
function savePlayer(){
  var first=document.getElementById('pFirst').value.trim();if(!first){toast('Enter a first name');return;}
  var data={num:document.getElementById('pNum').value.trim(),pos:document.getElementById('pPos').value,first:first,last:document.getElementById('pLast').value.trim(),age:document.getElementById('pAge').value.trim(),bats:document.getElementById('pBats').value};

  if(editPid){var p=null;for(var i=0;i<S.players.length;i++){if(S.players[i].id===editPid){p=S.players[i];break;}}if(p){if(!pendingPhoto&&p.photo)data.photo=p.photo;Object.assign(p,data);}}
  else{data.id=uid();S.players.push(data);}
  save();closeAll();toast(editPid?'Updated!':'Player added!');renderRoster();
}
document.getElementById('photoInput').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;

  reader.onload=function(ev){

// ── PLAYER DETAIL ──
function openPlayerDetail(pid){curPid=pid;showTab('player');}
function renderPlayerDetail(){
  var p=null;for(var i=0;i<S.players.length;i++){if(S.players[i].id===curPid){p=S.players[i];break;}}
  if(!p){showTab('roster');return;}
  var b=aggBat(p.id),pt=aggPitch(p.id);
  // at-bat log grouped by game
  var pabs=S.atbats.filter(function(a){return a.playerId===p.id;});

  // sort game order by date desc
  gOrder.sort(function(x,y){
    var gx=null,gy=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===x)gx=S.games[i];if(S.games[i].id===y)gy=S.games[i];}
    return(gy?gy.date:'').localeCompare(gx?gx.date:'');

        +'<span style="font-family:Bebas Neue,sans-serif;font-size:15px;color:var(--gold2)">'+gb.avg+' &middot; '+gb.h+'-'+gb.ab+'</span></div>';
      for(var i=0;i<gabs.length;i++){

          +'<div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:600;color:var(--cream)">'

          +(a.ballType?({F:'Fly',G:'Grd',L:'Line',P:'Pop'}[a.ballType]||a.ballType):'')
          +(n(a.rbi)?' &middot; '+a.rbi+' RBI':'')
          +(n(a.sb)?' &middot; '+a.sb+' SB':'')

      }
    }
  } else{abLog='<div style="padding:20px;text-align:center;color:var(--muted)">No at-bats logged yet.</div>';}

  // pitching log
  var pLog='';
  if(pt.games>0){
    var pps=S.pitching.filter(function(x){return x.playerId===p.id;});
    pps.sort(function(a,bb){var ga=null,gb=null;for(var i=0;i<S.games.length;i++){if(S.games[i].id===a.gameId)ga=S.games[i];if(S.games[i].id===bb.gameId)gb=S.games[i];}return(gb?gb.date:'').localeCompare(ga?ga.date:'');});
    for(var i=0;i<pps.length;i++){
      var pp=pps[i];var g=null;for(var j=0;j<S.games.length;j++){if(S.games[j].id===pp.gameId){g=S.games[j];break;}}
      pLog+='<div class="ab-entry" data-ptid="'+pp.id+'">'

        +'<div style="flex:1"><div style="font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:600">'+fmtDate(g?g.date:'')+' vs. '+(g?g.opp||'?':'?')+' &middot; '+pp.ip+' IP &middot; '+pp.k+' K &middot; '+(pp.er||0)+' ER'+(pp.pitches?' &middot; '+pp.pitches+' pitches':'')+'</div></div>'
        +'<button style="background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer;" data-editptid="'+pp.id+'">Edit</button></div>';
    }
  }

  var el=document.getElementById('playerDetail');
  el.innerHTML='<div class="hero">'+avLg(p)+'<div style="flex:1">'
    +'<div class="hero-name">'+pname(p)+'</div>'
    +'<div class="hero-meta">#'+(p.num||'?')+' &middot; '+(p.pos||'-')+' &middot; Age '+(p.age||'?')+' &middot; Bats '+(p.bats||'?')+'</div>'
    +'<div style="margin-top:8px"><button class="btn btn-ghost btn-sm" data-action="editp">Edit Player</button></div>'
    +'</div></div>'
    // SEASON BATTING
    +'<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Season Batting</span><span style="font-size:12px;color:var(--muted)">'+b.games+' G &middot; '+b.pas+' PA</span></div>'
    +'<div class="stat-grid">'
    +'<div class="stat-cell"><div class="sv star">'+b.avg+'</div><div class="sl">AVG</div></div>'
    +'<div class="stat-cell"><div class="sv gold">'+b.h+'</div><div class="sl">Hits</div></div>'
    +'<div class="stat-cell"><div class="sv">'+b.ab+'</div><div class="sl">AB</div></div>'
    +'<div class="stat-cell"><div class="sv gold">'+b.rbi+'</div><div class="sl">RBI</div></div>'
    +'<div class="stat-cell"><div class="sv">'+b.h1+'</div><div class="sl">1B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+b.h2+'</div><div class="sl">2B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+b.h3+'</div><div class="sl">3B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+b.hr+'</div><div class="sl">HR</div></div>'
    +'</div>'
    +'<div class="rate-strip">'
    +'<div class="rate-cell"><div class="rv">'+b.obp+'</div><div class="rl">OBP</div></div>'
    +'<div class="rate-cell"><div class="rv">'+b.slg+'</div><div class="rl">SLG</div></div>'
    +'<div class="rate-cell"><div class="rv">'+b.ops+'</div><div class="rl">OPS</div></div>'
    +'<div class="rate-cell"><div class="rv">'+b.k+'</div><div class="rl">K</div></div>'
    +'</div></div>'
    // SEASON PITCHING
    +(pt.games>0?'<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Season Pitching</span><span style="font-size:12px;color:var(--muted)">'+pt.w+'-'+pt.l+' &middot; '+pt.sv+' SV</span></div>'
    +'<div class="stat-grid">'
    +'<div class="stat-cell"><div class="sv gold">'+pt.era+'</div><div class="sl">ERA</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.ip+'</div><div class="sl">IP</div></div>'
    +'<div class="stat-cell"><div class="sv green">'+pt.k+'</div><div class="sl">K</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.whip+'</div><div class="sl">WHIP</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.bb+'</div><div class="sl">BB</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.h+'</div><div class="sl">H Allow</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.er+'</div><div class="sl">ER</div></div>'
    +'<div class="stat-cell"><div class="sv">'+pt.pc+'</div><div class="sl">Pitches</div></div>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">Pitching Log</span></div>'+pLog+'</div>'
    :'')
    +'<div class="card"><div class="card-head"><span class="card-title">At-Bat Log</span></div>'+abLog+'</div>';

  var editBtn=el.querySelector('[data-action="editp"]');
  if(editBtn)editBtn.addEventListener('click',function(){openPlayerModal(curPid);});
  var editABBtns=el.querySelectorAll('[data-editabid]');
  for(var i=0;i<editABBtns.length;i++){(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var abid=btn.getAttribute('data-editabid');var ab=null;for(var j=0;j<S.atbats.length;j++){if(S.atbats[j].id===abid){ab=S.atbats[j];break;}}if(ab){editAbId=abid;openABModal(ab.gameId,ab.playerId,abid);}});})(editABBtns[i]);}
  var abRows=el.querySelectorAll('[data-action="editab"]');
  for(var i=0;i<abRows.length;i++){(function(row){row.addEventListener('click',function(e){if(e.target.tagName==='BUTTON')return;var abid=row.getAttribute('data-abid');if(abid){var ab=null;for(var j=0;j<S.atbats.length;j++){if(S.atbats[j].id===abid){ab=S.atbats[j];break;}}if(ab)openABModal(ab.gameId,ab.playerId,abid);}});})(abRows[i]);}
  var editPtBtns=el.querySelectorAll('[data-editptid]');

// ── TEAM DASHBOARD ──
function renderTeam(){
  var el=document.getElementById('teamContent');
  var allABs=S.atbats,allPitch=S.pitching;
  if(!allABs.length&&!allPitch.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">&#9889;</div><div class="empty-title">No Stats Yet</div><div class="empty-sub">Log games to see team stats here</div></div>';return;}
  var tAB=0,tH=0,tH1=0,tH2=0,tH3=0,tHR=0,tBB=0,tK=0,tRBI=0,tSB=0,tR=0,tTB=0;
  for(var i=0;i<allABs.length;i++){
    var a=allABs[i];
    if(isWalk(a.result))tBB++;else tAB++;
    if(a.result==='1B'){tH++;tH1++;tTB+=1;}
    else if(a.result==='2B'){tH++;tH2++;tTB+=2;}
    else if(a.result==='3B'){tH++;tH3++;tTB+=3;}
    else if(a.result==='HR'||a.result==='GS'){tH++;tHR++;tTB+=4;}
    if(a.result==='K')tK++;
    tRBI+=n(a.rbi);tSB+=n(a.sb);tR+=n(a.r||0);
  }
  var tAvg=tAB?'.'+String(Math.round(tH/tAB*1000)).padStart(3,'0'):'.000';
  var tPA=tAB+tBB;
  var tOBP=tPA?'.'+String(Math.round((tH+tBB)/tPA*1000)).padStart(3,'0'):'.000';
  var tSLG=tAB?'.'+String(Math.round(tTB/tAB*1000)).padStart(3,'0'):'.000';
  var tIP=0,tER=0,tPitchK=0,tPitchBB=0,tPitchH=0,tW=0,tL=0;
  for(var i=0;i<allPitch.length;i++){var p=allPitch[i];tIP+=n(p.ip);tER+=n(p.er);tPitchK+=n(p.k);tPitchBB+=n(p.bb);tPitchH+=n(p.h);if(p.result==='W')tW++;else if(p.result==='L')tL++;}
  var tERA=tIP?((tER/tIP)*9).toFixed(2):'-.--';
  var tWHIP=tIP?((tPitchBB+tPitchH)/tIP).toFixed(2):'-.--';
  var w=0,l=0;
  var gms=S.games.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  for(var i=0;i<gms.length;i++){var g=gms[i];var inn=getInn(g);var us=sumArr(inn.us),them=sumArr(inn.them);if(us||them){if(us>them)w++;else if(us<them)l++;}}
  el.innerHTML='<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">&#127942; Season Record</span><span style="font-size:12px;color:var(--muted)">'+S.season+'</span></div>'
    +'<div class="team-stat-grid">'
    +'<div class="team-stat"><div class="team-stat-val" style="color:var(--green3)">'+w+'</div><div class="team-stat-lbl">Wins</div></div>'
    +'<div class="team-stat"><div class="team-stat-val" style="color:var(--red)">'+l+'</div><div class="team-stat-lbl">Losses</div></div>'
    +'<div class="team-stat"><div class="team-stat-val">'+gms.length+'</div><div class="team-stat-lbl">Games</div></div>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">&#9889; Team Batting</span><span style="font-size:12px;color:var(--muted)">'+tAB+' AB &middot; '+tPA+' PA</span></div>'
    +'<div class="stat-grid">'
    +'<div class="stat-cell"><div class="sv star">'+tAvg+'</div><div class="sl">AVG</div></div>'
    +'<div class="stat-cell"><div class="sv gold">'+tH+'</div><div class="sl">Hits</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tAB+'</div><div class="sl">AB</div></div>'
    +'<div class="stat-cell"><div class="sv gold">'+tRBI+'</div><div class="sl">RBI</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tH1+'</div><div class="sl">1B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tH2+'</div><div class="sl">2B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tH3+'</div><div class="sl">3B</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tHR+'</div><div class="sl">HR</div></div>'
    +'</div>'
    +'<div class="rate-strip">'
    +'<div class="rate-cell"><div class="rv">'+tOBP+'</div><div class="rl">OBP</div></div>'
    +'<div class="rate-cell"><div class="rv">'+tSLG+'</div><div class="rl">SLG</div></div>'
    +'<div class="rate-cell"><div class="rv">'+tR+'</div><div class="rl">Runs</div></div>'
    +'<div class="rate-cell"><div class="rv">'+tSB+'</div><div class="rl">SB</div></div>'
    +'</div></div>'
    +(tIP>0?'<div class="card" style="margin-bottom:12px;"><div class="card-head"><span class="card-title">&#9876; Team Pitching</span></div>'
    +'<div class="stat-grid">'
    +'<div class="stat-cell"><div class="sv gold">'+tERA+'</div><div class="sl">ERA</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tIP+'</div><div class="sl">IP</div></div>'
    +'<div class="stat-cell"><div class="sv green">'+tPitchK+'</div><div class="sl">K</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tWHIP+'</div><div class="sl">WHIP</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tPitchBB+'</div><div class="sl">BB</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tPitchH+'</div><div class="sl">H Allow</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tER+'</div><div class="sl">ER</div></div>'
    +'<div class="stat-cell"><div class="sv">'+tW+'-'+tL+'</div><div class="sl">W-L</div></div>'
    +'</div></div>':'');
}

// ── LEADERS ──
function renderLeaders(){
  var el=document.getElementById('leadersContent');
  if(!S.players.length){el.innerHTML='<div class="empty"><div class="empty-ico">&#127942;</div><div class="empty-title">No Data Yet</div><div class="empty-sub">Log games to see leaderboards</div></div>';return;}
  var cats=[{k:'avg',l:'AVG'},{k:'ops',l:'OPS'},{k:'obp',l:'OBP'},{k:'slg',l:'SLG'},{k:'h',l:'Hits'},{k:'h2',l:'Doubles'},{k:'h3',l:'Triples'},{k:'hr',l:'HR'},{k:'rbi',l:'RBI'},{k:'r',l:'Runs'},{k:'sb',l:'SB'},{k:'k',l:'K (bat)'},{k:'era',l:'ERA'},{k:'kp',l:'K (pitch)'},{k:'whip',l:'WHIP'}];
  var tabs='<div class="lb-tabs">';for(var i=0;i<cats.length;i++)tabs+='<button class="lb-tab'+(lbCat===cats[i].k?' active':'')+'" data-cat="'+cats[i].k+'">'+cats[i].l+'</button>';tabs+='</div>';
  var players=[];for(var i=0;i<S.players.length;i++){var b=aggBat(S.players[i].id),pt=aggPitch(S.players[i].id);if(b.pas>0||pt.games>0)players.push({p:S.players[i],b:b,pt:pt});}
  var pitchCats=['era','kp','whip'];var sorted;
  if(lbCat==='era')sorted=players.filter(function(x){return x.pt.games>0&&x.pt.ip>0;}).sort(function(a,b){return parseFloat(a.pt.era)-parseFloat(b.pt.era);});
  else if(lbCat==='kp')sorted=players.filter(function(x){return x.pt.games>0;}).sort(function(a,b){return b.pt.k-a.pt.k;});
  else if(lbCat==='whip')sorted=players.filter(function(x){return x.pt.games>0&&x.pt.ip>0;}).sort(function(a,b){return parseFloat(a.pt.whip)-parseFloat(b.pt.whip);});
  else if(['avg','ops','obp','slg'].indexOf(lbCat)>=0)sorted=players.filter(function(x){return x.b.ab>0;}).sort(function(a,b){return parseFloat(b.b[lbCat])-parseFloat(a.b[lbCat]);});
  else sorted=players.filter(function(x){return x.b.pas>0;}).sort(function(a,b){return n(b.b[lbCat])-n(a.b[lbCat]);});
  var rows='<div class="card">';
  if(!sorted.length)rows+='<div style="padding:20px;text-align:center;color:var(--muted)">No data for this category</div>';
  else{for(var i=0;i<sorted.length;i++){var x=sorted[i];
    var val=pitchCats.indexOf(lbCat)>=0?(lbCat==='era'?x.pt.era:lbCat==='whip'?x.pt.whip:x.pt.k):x.b[lbCat];
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'';var ri=i===0?'&#127945;':i===1?'&#129352;':i===2?'&#129353;':(i+1);
    rows+='<div class="lb-row"><div class="lb-rank '+rc+'">'+ri+'</div>'+avSm(x.p)+'<div style="margin-left:6px"><div style="font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:700">'+pname(x.p)+'</div><div style="font-size:10px;color:var(--muted)">#'+(x.p.num||'?')+' '+(x.p.pos||'-')+'</div></div><div class="lb-val">'+val+'</div></div>';}}
  rows+='</div>';
  el.innerHTML=tabs+rows;
  addClick(el,'[data-cat]',function(btn){lbCat=btn.getAttribute('data-cat');renderLeaders();});
}

// ── UTILS ──
function addClick(container,sel,fn){
  var items=container.querySelectorAll(sel);
  for(var i=0;i<items.length;i++){(function(el){el.addEventListener('click',function(e){fn(el,e);});})(items[i]);}
}

var overlays=document.querySelectorAll('.overlay');
for(var i=0;i<overlays.length;i++){overlays[i].addEventListener('click',function(e){if(e.target===this)closeAll();});}
load();renderSchedule();updateFab();
